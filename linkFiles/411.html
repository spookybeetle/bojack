<!doctype html>
<episode>

  <title>Time's Arrow - BoJack Horseman</title>
  
  


<script>
  
  Time's Arrow
<tStamp t=00:00:11></tStamp>

<p>
Slow down, Henrietta.

A lady mustn't rush. It's unbecoming.

</p>
<tStamp t=00:00:15></tStamp>

<p>
I am not Henrietta! I'm your son!

</p>
<tStamp t=00:00:17></tStamp>

<p>
My son is a ball of gas.

</p>
<tStamp t=00:00:19></tStamp>

<p>
Yes! Your son, BoJack. I'm him.

I'm the ball of gas!

</p>
<tStamp t=00:00:23></tStamp>

<p>
But you're also a star.

</p>
<tStamp t=00:00:26></tStamp>

<p>
Wait. Mom, do you remember--

</p>
<tStamp t=00:00:27></tStamp>

<p>
Shh! Henrietta, I am talking to the sun.

</p>
<tStamp t=00:00:30></tStamp>

<p>
Sun, you're a ball of gas,

but you're also a star.

</p>
<tStamp t=00:00:34></tStamp>

<p>
-We call you... "Sun."

-Ugh!

</p>
<tStamp t=00:00:36></tStamp>

<p>
Where are you taking me?

Are we going to the lake house?

</p>
<tStamp t=00:00:39></tStamp>

<p>
No, we're going

to a glorious magical place

where they'll lock you

in a room by yourself

so you can't hurt anyone ever again.

</p>
<tStamp t=00:00:47></tStamp>

<p>
Oh, that sounds lovely.

Why are you driving so slowly?

</p>
<tStamp t=00:00:50></tStamp>

<p>
-Hurry up!

-Wait. You just said--

</p>
<tStamp t=00:00:51></tStamp>

<p>
Time's arrow neither stands still

nor reverses, after all.

</p>
<tStamp t=00:00:55></tStamp>

<p>
It merely marches forward.

Isn't that right, Henrietta?

</p>
<tStamp t=00:01:00></tStamp>

<p>
Yes, Mrs. Horseman. That's right.

</p>
<tStamp t=00:01:02></tStamp>

<p>
[humming]

</p>
<tStamp t=00:01:06></tStamp>

<p>
Well, here we are.

</p>
<tStamp t=00:01:07></tStamp>

<p>
-Here?

-Yes.

</p>
<tStamp t=00:01:09></tStamp>

<p>
[humming]

</p>
<tStamp t=00:01:11></tStamp>

<p>
Ugh!

</p>
<tStamp t=00:01:25></tStamp>

<p>
{\an8}[theme music playing]

</p>
<tStamp t=00:02:22></tStamp>

<p>
-[wind gusting]

-[children laughing]

</p>
<tStamp t=00:02:24></tStamp>

<p>
[coughs]

</p>
<tStamp t=00:02:25></tStamp>

<p>
[laughter]

</p>
<tStamp t=00:02:28></tStamp>

<p>
Halt! No entry.

</p>
<tStamp t=00:02:30></tStamp>

<p>
-But I wanna slide.

-This is no mere slide.

</p>
<tStamp t=00:02:33></tStamp>

<p>
{\an8}We three are members

of an elite society

</p>
<tStamp t=00:02:35></tStamp>

<p>
{\an8}of extremely young women,

</p>
<tStamp t=00:02:37></tStamp>

<p>
{\an8}led by I,

Miss Clemelia Bloodsworth.

</p>
<tStamp t=00:02:41></tStamp>

<p>
{\an8}You may not enter.

</p>
<tStamp t=00:02:42></tStamp>

<p>
{\an8}-Yeah, and also you're fat.

-Oh!

</p>
<tStamp t=00:02:45></tStamp>

<p>
I'm not fat. [coughs]

</p>
<tStamp t=00:02:46></tStamp>

<p>
{\an8}Even your lungs expostulate

</p>
<tStamp t=00:02:48></tStamp>

<p>
{\an8}as they struggle to expel

your ample corpulence.

</p>
<tStamp t=00:02:51></tStamp>

<p>
{\an8}She's saying your lungs

think you're fat too.

</p>
<tStamp t=00:02:54></tStamp>

<p>
Father says I'm just growing.

</p>
<tStamp t=00:02:56></tStamp>

<p>
{\an8}If you do not halt, we will be forced

to physically impede your egress.

</p>
<tStamp t=00:03:01></tStamp>

<p>
Ow! Ow! You're hurting me! Ow!

</p>
<tStamp t=00:03:04></tStamp>

<p>
[cries out]

</p>
<tStamp t=00:03:05></tStamp>

<p>
[grunts]

</p>
<tStamp t=00:03:06></tStamp>

<p>
-[girls laughing]

-[crying]

</p>
<tStamp t=00:03:12></tStamp>

<p>
{\an8}Beatrice, stop reading

and put on your uniform.

</p>
<tStamp t=00:03:15></tStamp>

<p>
{\an8}Father, I don't feel well.

[coughing]

</p>
<tStamp t=00:03:18></tStamp>

<p>
I don't care if you're scared

of Clemelia Bloodsworth and her gaggle,

you have to go to school.

</p>
<tStamp t=00:03:22></tStamp>

<p>
{\an8}Now stop making books your friends.

</p>
<tStamp t=00:03:24></tStamp>

<p>
{\an8}Reading does nothing for young women

but build their brains,

</p>
<tStamp t=00:03:27></tStamp>

<p>
{\an8}taking valuable resources away

from their breasts and hips.

</p>
<tStamp t=00:03:31></tStamp>

<p>
{\an8}-But my throat hurts.

-Uniform! Now!

</p>
<tStamp t=00:03:34></tStamp>

<p>
[moans]

</p>
<tStamp t=00:03:35></tStamp>

<p>
[sighs]

</p>
<tStamp t=00:03:37></tStamp>

<p>
Beatrice? Oh, my, you're hot.

</p>
<tStamp t=00:03:39></tStamp>

<p>
Dear Lord.

</p>
<tStamp t=00:03:44></tStamp>

<p>
{\an8}[Joseph] Now listen here, it's

a mother's duty to keep her children alive

</p>
<tStamp t=00:03:48></tStamp>

<p>
{\an8}and you are continually failing!

</p>
<tStamp t=00:03:50></tStamp>

<p>
How could you not have known

she has scarlet fever?

</p>
<tStamp t=00:03:53></tStamp>

<p>
Say something, damn it!

What has become of you?

</p>
<tStamp t=00:03:55></tStamp>

<p>
I swear if I'd known

this is how you'd behave

once we severed the connections

to your prefrontal cortex,

</p>
<tStamp t=00:04:01></tStamp>

<p>
I'd hardly have bothered.

</p>
<tStamp t=00:04:02></tStamp>

<p>
-Father?

-[gasps] Yes, darling?

</p>
<tStamp t=00:04:05></tStamp>

<p>
Am I to die?

</p>
<tStamp t=00:04:06></tStamp>

<p>
Well, eventually yes,

but this illness is but a hiccup

in what will be a long and happy life,

</p>
<tStamp t=00:04:11></tStamp>

<p>
-I promise.

-You promise?

</p>
<tStamp t=00:04:12></tStamp>

<p>
In fact, some good

may yet come of this.

</p>
<tStamp t=00:04:14></tStamp>

<p>
Doctor says your throat

is nearly swollen shut.

</p>
<tStamp t=00:04:17></tStamp>

<p>
So perhaps you'll finally lose

some of that weight

that's given you such troubles.

</p>
<tStamp t=00:04:20></tStamp>

<p>
-Won't that be nice?

-Yes, Father.

</p>
<tStamp t=00:04:26></tStamp>

<p>
-Ow!

-Suck in, Miss Sugarman, please.

</p>
<tStamp t=00:04:28></tStamp>

<p>
{\an8}Polly, be a darling and fetch me

a pretty pill

and a glass of water, won't you?

</p>
<tStamp t=00:04:32></tStamp>

<p>
{\an8}Yes, Señorita Sugarman.

</p>
<tStamp t=00:04:34></tStamp>

<p>
{\an8}Beatrice, you're looking well,

which is just fine,

</p>
<tStamp t=00:04:36></tStamp>

<p>
{\an8}because your debutante party

is vitally important.

</p>
<tStamp t=00:04:39></tStamp>

<p>
Will it end poverty, war and injustice,

or bring back civil rights

activist Medgar Evers,

who was shot in Mississippi

this week?

</p>
<tStamp t=00:04:46></tStamp>

<p>
Yes! Or rather, it will end you

worrying about that nonsense

because it will land you a husband.

</p>
<tStamp t=00:04:51></tStamp>

<p>
{\an8}At least Evers' death means no one else

will be assassinated this year, 1963.

</p>
<tStamp t=00:04:57></tStamp>

<p>
The FBI is on too high alert to allow

anything like that to happen again.

</p>
<tStamp t=00:05:01></tStamp>

<p>
-Hmm?

-Yes... well...

</p>
<tStamp t=00:05:03></tStamp>

<p>
Your chaperone,

Corbin Creamerman,

is a fine young man.

</p>
<tStamp t=00:05:06></tStamp>

<p>
Oh, jeez.

</p>
<tStamp t=00:05:08></tStamp>

<p>
-My lady. [chuckles] Here you go.

-Thanks.

</p>
<tStamp t=00:05:14></tStamp>

<p>
So... uh, you look nice.

</p>
<tStamp t=00:05:18></tStamp>

<p>
Thank you, Corbin.

That's the third time you've told me.

</p>
<tStamp t=00:05:21></tStamp>

<p>
You needn't tell me again.

</p>
<tStamp t=00:05:22></tStamp>

<p>
Oh, jeez. I'm sorry.

I'm not always good at these things.

</p>
<tStamp t=00:05:26></tStamp>

<p>
But sometimes I am.

I can be. I-- I really try to be.

</p>
<tStamp t=00:05:29></tStamp>

<p>
I'm, well, I-- I'm not. I'm really not.

I don't know why.

</p>
<tStamp t=00:05:32></tStamp>

<p>
Ah, that's all right. I'm not either.

</p>
<tStamp t=00:05:35></tStamp>

<p>
[Joseph]

Corbin's father, Mort Creamerman,

is founder of Creamerman's

Creamy Cream-based Commodities.

</p>
<tStamp t=00:05:40></tStamp>

<p>
Think of all the free iced cream

you could, uh, serve to other people.

</p>
<tStamp t=00:05:44></tStamp>

<p>
Father, do you aim to marry me off

to Corbin Creamerman

merely because it would be good

for business?

</p>
<tStamp t=00:05:49></tStamp>

<p>
Well, I suppose I do have a few ideas

of how a Sugarman/Creamerman

alliance might be advantageous.

</p>
<tStamp t=00:05:54></tStamp>

<p>
-Uh-huh.

-For example,

imagine a television advertisement

with a fun jingle.

</p>
<tStamp t=00:05:58></tStamp>

<p>
<i>♪ Have your morning coffee or tea ♪</i>

</p>
<tStamp t=00:06:01></tStamp>

<p>
<i>♪ With Sugarman and Creamerman ♪</i>

</p>
<tStamp t=00:06:03></tStamp>

<p>
<i>♪ But save some for... these fellas ♪</i>

</p>
<tStamp t=00:06:05></tStamp>

<p>
And then it's Mort and me,

and we're holding up our products

with big smiles from across

a very ordinary looking kitchen table.

</p>
<tStamp t=00:06:11></tStamp>

<p>
Father, common Americans

don't want you on their TV sets.

</p>
<tStamp t=00:06:14></tStamp>

<p>
You're a reminder of the disparity

of wealth in this country.

</p>
<tStamp t=00:06:18></tStamp>

<p>
Poor people find that dreadfully gauche.

</p>
<tStamp t=00:06:20></tStamp>

<p>
You know, I sent you to Barnard

to get your MRS

from a fine upstanding Columbia man,

but instead of a bachelor

you returned home

with a bachelor's degree

and a mouth full of sass.

</p>
<tStamp t=00:06:30></tStamp>

<p>
What a waste!

</p>
<tStamp t=00:06:32></tStamp>

<p>
[sighs]

</p>
<tStamp t=00:06:34></tStamp>

<p>
-[Corbin] <i>You look nice.</i>

-Thank you.

</p>
<tStamp t=00:06:36></tStamp>

<p>
Oh, my... Beatrice Sugarman?

Doth my eye belie me?

</p>
<tStamp t=00:06:41></tStamp>

<p>
Oh, Clemelia Bloodsworth.

Why are you here?

</p>
<tStamp t=00:06:45></tStamp>

<p>
I must say,

it's tremendous you're finally debuting.

</p>
<tStamp t=00:06:49></tStamp>

<p>
Better late than never, hmm?

[chuckles]

</p>
<tStamp t=00:06:51></tStamp>

<p>
Ugh! I'm only doing this for my father,

who has very old-fashioned ideas

about how a woman is to live her life.

</p>
<tStamp t=00:06:57></tStamp>

<p>
Poor Corbin here is saddled

with chaperoning me.

</p>
<tStamp t=00:07:00></tStamp>

<p>
Oh, I don't feel saddled.

</p>
<tStamp t=00:07:02></tStamp>

<p>
In truth,

I find these parties to be garish,

self-serving wastes of money.

</p>
<tStamp t=00:07:06></tStamp>

<p>
Oh, and I'm sure yours

was particularly horrendous, Clemelia.

</p>
<tStamp t=00:07:10></tStamp>

<p>
[spits and coughs]

</p>
<tStamp t=00:07:11></tStamp>

<p>
Oh, my! How repugnant!

</p>
<tStamp t=00:07:17></tStamp>

<p>
Uh... scotch on the rocks.

</p>
<tStamp t=00:07:21></tStamp>

<p>
-Do I know you?

-[chuckles]

</p>
<tStamp t=00:07:23></tStamp>

<p>
Nope, just crashing some dumb

debutante's party. [chuckles]

</p>
<tStamp t=00:07:26></tStamp>

<p>
Oh, do you mean for "dumb"

to describe the party or the debutante?

</p>
<tStamp t=00:07:30></tStamp>

<p>
Because I might agree with you,

or I might be offended.

</p>
<tStamp t=00:07:33></tStamp>

<p>
You're the dumb debutante, aren't you?

</p>
<tStamp t=00:07:35></tStamp>

<p>
Beatrice Sugarman.

Welcome to my dumb party.

</p>
<tStamp t=00:07:38></tStamp>

<p>
Butterscotch Horseman.

Charmed, I'm sure.

</p>
<tStamp t=00:07:40></tStamp>

<p>
You crash a lot of these?

</p>
<tStamp t=00:07:41></tStamp>

<p>
I'll take my free alcohol

where I can get it.

</p>
<tStamp t=00:07:43></tStamp>

<p>
Saving for California.

</p>
<tStamp t=00:07:45></tStamp>

<p>
What's in California?

</p>
<tStamp t=00:07:46></tStamp>

<p>
Ginsberg, Cassady, Squirrelinghetti.

</p>
<tStamp t=00:07:48></tStamp>

<p>
This is where you ask me

if those are towns, and I smirk at you.

</p>
<tStamp t=00:07:51></tStamp>

<p>
I am familiar with the Beats,

thank you.

</p>
<tStamp t=00:07:53></tStamp>

<p>
I like Ginsberg all right,

but if you ask me,

that Squirrelinghetti is nuts.

</p>
<tStamp t=00:07:58></tStamp>

<p>
-What's your interest in them?

-What's my interest?

</p>
<tStamp t=00:08:00></tStamp>

<p>
They're the greatest minds

of our generation.

</p>
<tStamp t=00:08:02></tStamp>

<p>
I'm heading west to join them,

because I'm one of the greatest minds too.

</p>
<tStamp t=00:08:06></tStamp>

<p>
-I see.

-You will see.

</p>
<tStamp t=00:08:07></tStamp>

<p>
I'm writing the next

Great American Novel.

</p>
<tStamp t=00:08:09></tStamp>

<p>
Oh, what's it about?

</p>
<tStamp t=00:08:11></tStamp>

<p>
It's about truth! It's about war!

</p>
<tStamp t=00:08:13></tStamp>

<p>
It's about the twilighting frontier

of the lives that were promised us.

</p>
<tStamp t=00:08:16></tStamp>

<p>
But what is it about?

Who are the characters?

</p>
<tStamp t=00:08:19></tStamp>

<p>
I never claimed to have

the whole thing

sorted out just yet, did I?

</p>
<tStamp t=00:08:22></tStamp>

<p>
Sounds like a best seller.

</p>
<tStamp t=00:08:23></tStamp>

<p>
You're sarcastic, which is an ugly thing

for a woman to be.

</p>
<tStamp t=00:08:26></tStamp>

<p>
I don't know how you expect

to nab a husband at a party like this

with a personality like that.

</p>
<tStamp t=00:08:30></tStamp>

<p>
Oh, congratulations. You and my father

express the same concerns.

</p>
<tStamp t=00:08:34></tStamp>

<p>
[chuckles] If I were your old man,

</p>
<tStamp t=00:08:36></tStamp>

<p>
I'd be anxious

to get you married off, too.

</p>
<tStamp t=00:08:38></tStamp>

<p>
I bet your thank-you letters

are perfunctory,

your flower arrangements

are uninspired,

and your curtsy is an embarrassment.

</p>
<tStamp t=00:08:45></tStamp>

<p>
-[chuckles]

-[laughs]

</p>
<tStamp t=00:08:46></tStamp>

<p>
Looks like you pegged me

as well as I pegged you.

</p>
<tStamp t=00:08:48></tStamp>

<p>
[clicks tongue]

</p>
<tStamp t=00:08:50></tStamp>

<p>
What must your mother think of you?

</p>
<tStamp t=00:08:52></tStamp>

<p>
Oh, she doesn't think much...

about anything, anymore.

</p>
<tStamp t=00:08:55></tStamp>

<p>
Oh. I'm sorry, did... did she pass?

</p>
<tStamp t=00:08:57></tStamp>

<p>
-No, not exactly.

-Mine did.

</p>
<tStamp t=00:09:00></tStamp>

<p>
I'm very sorry to hear that.

</p>
<tStamp t=00:09:02></tStamp>

<p>
I was little. I don't remember, really.

</p>
<tStamp t=00:09:04></tStamp>

<p>
But she had a diamond just like yours.

I saw it in a picture once.

</p>
<tStamp t=00:09:08></tStamp>

<p>
Oh...

</p>
<tStamp t=00:09:09></tStamp>

<p>
-[BoJack] Yes, this is my mother.

-What?

</p>
<tStamp t=00:09:11></tStamp>

<p>
I'd like to leave her here.

</p>
<tStamp t=00:09:12></tStamp>

<p>
Can I pay for the next five years now

so I don't have to think about her again?

</p>
<tStamp t=00:09:16></tStamp>

<p>
-Wha-- Oh.

-[Corbin] Oh, jeez, I--

</p>
<tStamp t=00:09:17></tStamp>

<p>
I'm sorry to interrupt,

but we have to do the thing now,

where we do the... things.

</p>
<tStamp t=00:09:23></tStamp>

<p>
Oh-- oh, right. Um...

</p>
<tStamp t=00:09:25></tStamp>

<p>
-Please excuse me.

-Of course, it sounds very important.

</p>
<tStamp t=00:09:29></tStamp>

<p>
Mr. and Mrs. Joseph Sugarman

present their daughter,

</p>
<tStamp t=00:09:33></tStamp>

<p>
Miss Beatrice Elizabeth Sugarman.

</p>
<tStamp t=00:09:35></tStamp>

<p>
Chaperoned by Mr. Corbin C. Creamerman.

</p>
<tStamp t=00:09:40></tStamp>

<p>
Look at her go, folks.

</p>
<tStamp t=00:09:42></tStamp>

<p>
Clearing every hurdle.

</p>
<tStamp t=00:09:44></tStamp>

<p>
Look at that form.

</p>
<tStamp t=00:09:45></tStamp>

<p>
What precise movements.

</p>
<tStamp t=00:09:47></tStamp>

<p>
-[Beatrice] Five, six...

-[man] Beautiful trot.

</p>
<tStamp t=00:09:49></tStamp>

<p>
[softly] Truly outstanding.

</p>
<tStamp t=00:09:51></tStamp>

<p>
A lovely lady indeed.

</p>
<tStamp t=00:09:53></tStamp>

<p>
-Ta-da!

-[applause]

</p>
<tStamp t=00:09:55></tStamp>

<p>
[clears throat]

Excuse me. Sorry. Excuse me.

</p>
<tStamp t=00:09:58></tStamp>

<p>
Oh...

</p>
<tStamp t=00:10:01></tStamp>

<p>
Excuse me.

</p>
<tStamp t=00:10:02></tStamp>

<p>
Don't you know it's rude to leave

without saying goodbye to the hostess?

</p>
<tStamp t=00:10:06></tStamp>

<p>
Why don't you come with me?

</p>
<tStamp t=00:10:07></tStamp>

<p>
It'll dispense with the need for goodbyes,

thus eliminating my transgression.

</p>
<tStamp t=00:10:10></tStamp>

<p>
Oh! You want me to leave

my own party with you?

</p>
<tStamp t=00:10:14></tStamp>
