  <title>The Kidney Stays in the Picture - BoJack Horseman</title>
  
  


<script>
  
  The Kidney Stays in the Picture
<tStamp t=00:00:09></tStamp>

<p>
{\an8}...and they even let the birthday boy

pilot the airplane!

</p>
<tStamp t=00:00:13></tStamp>

<p>
{\an8}There were no survivors.

</p>
<tStamp t=00:00:15></tStamp>

<p>
{\an8}In other news, the newly formed

Hollywoo "Guild of Assistants"

</p>
<tStamp t=00:00:18></tStamp>

<p>
{\an8}is meeting with industry

power brokers today

</p>
<tStamp t=00:00:20></tStamp>

<p>
{\an8}to negotiate terms

for a standard agreement.

</p>
<tStamp t=00:00:23></tStamp>

<p>
{\an8}<i>I'm optimistic about the coming talks</i>

<i>and confident we can avoid a strike.</i>

</p>
<tStamp t=00:00:27></tStamp>

<p>
{\an8}<i>Our demands are reasonable,</i>

</p>
<tStamp t=00:00:29></tStamp>

<p>
{\an8}<i>and our services</i>

<i>are crucial to this industry.</i>

</p>
<tStamp t=00:00:31></tStamp>

<p>
All right, you little pishers,

let's wrap this up quick so you can all

go back to getting me wrong coffees.

</p>
<tStamp t=00:00:37></tStamp>

<p>
-What do you want?

-We have one request.

</p>
<tStamp t=00:00:39></tStamp>

<p>
To not be treated like garbage.

</p>
<tStamp t=00:00:41></tStamp>

<p>
It appears we are at an impasse.

</p>
<tStamp t=00:00:45></tStamp>

<p>
[people clamoring]

</p>
<tStamp t=00:00:47></tStamp>

<p>
-Where's my dry cleaning?

-Where's my car?

</p>
<tStamp t=00:00:50></tStamp>

<p>
I don't know any of my passwords!

What's my mother's maiden name?

</p>
<tStamp t=00:00:55></tStamp>

<p>
I'm going into labor!

You need to call my doula!

</p>
<tStamp t=00:00:58></tStamp>

<p>
Will somebody please make me

a reservation at Little Dom's?

</p>
<tStamp t=00:01:04></tStamp>

<p>
[car alarm blaring]

</p>
<tStamp t=00:01:05></tStamp>

<p>
{\an8}[theme song playing]

</p>
<tStamp t=00:01:59></tStamp>

<p>
{\an8}[birds chirping]

</p>
<tStamp t=00:02:02></tStamp>

<p>
{\an8}[groans]

</p>
<tStamp t=00:02:03></tStamp>

<p>
Oh, no. Did I really drink last night?

</p>
<tStamp t=00:02:06></tStamp>

<p>
{\an8}Doctor Champ, I am so sorry.

I-- [stutters]

</p>
<tStamp t=00:02:08></tStamp>

<p>
{\an8}-Did anyone see me?

-You were in here all night.

</p>
<tStamp t=00:02:10></tStamp>

<p>
{\an8}Nobody can know about this.

</p>
<tStamp t=00:02:12></tStamp>

<p>
{\an8}There are 20 struggling addicts

in this building who are counting on me.

</p>
<tStamp t=00:02:15></tStamp>

<p>
{\an8}[stammers] Of course.

</p>
<tStamp t=00:02:16></tStamp>

<p>
I'm gonna go home, take a shower.

</p>
<tStamp t=00:02:18></tStamp>

<p>
-This never happened.

-Agreed.

</p>
<tStamp t=00:02:20></tStamp>

<p>
But how do I get out of here

without anyone seeing me?

</p>
<tStamp t=00:02:23></tStamp>

<p>
[sighs]

</p>
<tStamp t=00:02:25></tStamp>

<p>
-Whoa!

-Okay, okay, easy.

</p>
<tStamp t=00:02:28></tStamp>

<p>
This requires a surprising amount

of upper-body strength.

</p>
<tStamp t=00:02:30></tStamp>

<p>
Stop swinging. Just slide down.

</p>
<tStamp t=00:02:32></tStamp>

<p>
Am I being inconspicuous?

</p>
<tStamp t=00:02:34></tStamp>

<p>
Yes. Plus or minus the yelling.

</p>
<tStamp t=00:02:36></tStamp>

<p>
-I'm just gonna let go.

-Don't--

</p>
<tStamp t=00:02:37></tStamp>

<p>
{\an8}-[both scream]

-[BoJack groans]

</p>
<tStamp t=00:02:40></tStamp>

<p>
{\an8}Thank you, BoJack,

for being there to catch me.

</p>
<tStamp t=00:02:42></tStamp>

<p>
{\an8}Up!

</p>
<tStamp t=00:02:45></tStamp>

<p>
{\an8}[engine starts]

</p>
<tStamp t=00:02:48></tStamp>

<p>
Ew.

</p>
<tStamp t=00:02:49></tStamp>

<p>
{\an8}"I looked in that case first chance I got

and there was that note still tied there.

</p>
<tStamp t=00:02:54></tStamp>

<p>
{\an8}That line hadn't touched water

in its life."

</p>
<tStamp t=00:02:57></tStamp>

<p>
{\an8}"Doesn't mean nothin', Alma."

</p>
<tStamp t=00:02:59></tStamp>

<p>
{\an8}"Don't try and fool me no more, Ennis.

I know what it means.

</p>
<tStamp t=00:03:03></tStamp>

<p>
{\an8}Jack Twist, Jack nasty!"

</p>
<tStamp t=00:03:05></tStamp>

<p>
{\an8}[knocking on door]

</p>
<tStamp t=00:03:07></tStamp>

<p>
{\an8}The sock puppet players tribute

to Ang Lee will continue after this.

</p>
<tStamp t=00:03:11></tStamp>

<p>
-Oh. Hello, Jorge.

-I have some news. It's about your mother.

</p>
<tStamp t=00:03:17></tStamp>

<p>
Oh, is the news that you're marrying her,

inserting yourself into our family

and ruining my life?

</p>
<tStamp t=00:03:22></tStamp>

<p>
Because I already heard that news

like 25 years ago, Jorge.

</p>
<tStamp t=00:03:26></tStamp>

<p>
-I didn't come to your home to fight.

-Then joke's on you

because you didn't come to my home at all.

</p>
<tStamp t=00:03:31></tStamp>

<p>
{\an8}-I just sleep on the couch...

-[Jorge sighs]

</p>
<tStamp t=00:03:34></tStamp>

<p>
{\an8}-...since you and Mom gave me the boot.

-That was ten years ago.

</p>
<tStamp t=00:03:37></tStamp>

<p>
Which, by the way,

is the only thing you ever gave me.

</p>
<tStamp t=00:03:40></tStamp>

<p>
I gave you my name,

and you have clearly wasted it.

</p>
<tStamp t=00:03:43></tStamp>

<p>
{\an8}Do you know what the Chavez name

stands for?

</p>
<tStamp t=00:03:45></tStamp>

<p>
{\an8}Yes, Jorge.

</p>
<tStamp t=00:03:47></tStamp>

<p>
Chavez! C for cerebral!

H for high-minded! A for analytical!

</p>
<tStamp t=00:03:53></tStamp>

<p>
V for veracious! E for efficacious!

</p>
<tStamp t=00:03:56></tStamp>

<p>
And Z for zealously practical.

</p>
<tStamp t=00:03:59></tStamp>

<p>
Feels like a cheat on the Z.

</p>
<tStamp t=00:04:00></tStamp>

<p>
Todd, your mother needs your help.

</p>
<tStamp t=00:04:02></tStamp>

<p>
Well, then instead of sending her husband,

she should have asked me herself,

if it's so important to her.

</p>
<tStamp t=00:04:06></tStamp>

<p>
-She's in a coma.

-A rudeness coma?

</p>
<tStamp t=00:04:09></tStamp>

<p>
No, a regular coma.

</p>
<tStamp t=00:04:12></tStamp>

<p>
Oh, my God! Why didn't you open with that?

</p>
<tStamp t=00:04:14></tStamp>

<p>
Please. Your mother needs a kidney.

</p>
<tStamp t=00:04:16></tStamp>

<p>
I put her on the donor waiting list,

but if you're a match...

</p>
<tStamp t=00:04:20></tStamp>

<p>
Oh. I'm sorry.

Of course I would give Mom my kidney.

</p>
<tStamp t=00:04:23></tStamp>

<p>
-Then there's no time to waste--

-"Would" give her my kidney.

</p>
<tStamp t=00:04:27></tStamp>

<p>
"Would." You need to work

on your listening skills.

</p>
<tStamp t=00:04:30></tStamp>

<p>
I sold my extra kidney just last week.

</p>
<tStamp t=00:04:32></tStamp>

<p>
{\an8}-Why?

-I wanted to buy these sock puppets.

</p>
<tStamp t=00:04:36></tStamp>

<p>
{\an8}You sold your kidney for... [groans]

I'm sorry I came.

</p>
<tStamp t=00:04:40></tStamp>

<p>
{\an8}If you'd like to visit your mother--

</p>
<tStamp t=00:04:42></tStamp>

<p>
Wait. What if instead

of visiting my mother,

we got my kidney back?

</p>
<tStamp t=00:04:46></tStamp>

<p>
{\an8}Come on, Ruthie!

Field trip to the organ market!

</p>
<tStamp t=00:04:50></tStamp>

<p>
{\an8}-[Ruthie coos]

-[groans]

</p>
<tStamp t=00:04:52></tStamp>

<p>
{\an8}[wind howling]

</p>
<tStamp t=00:04:54></tStamp>

<p>
[dial tone blaring]

</p>
<tStamp t=00:04:59></tStamp>

<p>
[thunder rumbles]

</p>
<tStamp t=00:05:01></tStamp>

<p>
Princess Carolyn, this is a catastrophe.

</p>
<tStamp t=00:05:02></tStamp>

<p>
-You know it.

-This strike has shut down the whole city!

</p>
<tStamp t=00:05:05></tStamp>

<p>
Assistants want respect?

</p>
<tStamp t=00:05:07></tStamp>

<p>
If we respect them, how are we supposed

to work through our rage issues?

</p>
<tStamp t=00:05:10></tStamp>

<p>
On our spouses and children?

That doesn't seem fair.

</p>
<tStamp t=00:05:13></tStamp>

<p>
There's gotta be a better way!

</p>
<tStamp t=00:05:15></tStamp>

<p>
Uh, maybe we could circumvent

giving the assistants what they want

by giving them what they think they want.

</p>
<tStamp t=00:05:21></tStamp>

<p>
You know, like how we satiate TV creators

by giving them little vanity cards

at the end of episodes,

then sell the shows to streaming networks

that auto-skip the end credits

so no one even sees the vanity cards!

</p>
<tStamp t=00:05:31></tStamp>

<p>
Yeah, yeah, that's good.

But what do assistants want?

iTunes gift cards? Amazon gift cards?

</p>
<tStamp t=00:05:36></tStamp>

<p>
I honestly can't think of another thing

an assistant would want.

</p>
<tStamp t=00:05:38></tStamp>

<p>
When I was an assistant,

the only thing I wanted

was not to be an assistant anymore.

</p>
<tStamp t=00:05:42></tStamp>

<p>
[gasps] Princess Carolyn, I'll say to you

what I said to David Levy

when we were developing

</p>
<tStamp t=00:05:46></tStamp>

<p>
<i>The Addams Family</i>

and brainstorming ancillary characters,

like cousins and whatnot: That's Itt!

</p>
<tStamp t=00:05:56></tStamp>

<p>
-[man] Hey! Sad dog!

-Ha-ha! You know it!

</p>
<tStamp t=00:05:59></tStamp>

<p>
Wow. Mr. Peanutbutter

and Joey Pogo in the same room?

</p>
<tStamp t=00:06:03></tStamp>

<p>
What is this? Two days ago

when I almost hit you with my car?

</p>
<tStamp t=00:06:07></tStamp>

<p>
[chuckles] No! That was outside!

</p>
<tStamp t=00:06:09></tStamp>

<p>
Listen, I've been trying

to get in touch with you.

</p>
<tStamp t=00:06:12></tStamp>

<p>
I got a call from this mental health

advocacy group.

</p>
<tStamp t=00:06:14></tStamp>

<p>
Those guys are jizzin' their pants

over your heroic admission

of your struggle with depression,

and they wanna help you

share your story with the world.

</p>
<tStamp t=00:06:21></tStamp>

<p>
The world, huh?

</p>
<tStamp t=00:06:22></tStamp>

<p>
I wanted to set up a meeting,

but my assistant went on strike,

and phones, for me, are, like, what?

</p>
<tStamp t=00:06:29></tStamp>

<p>
Even if you had your assistant,

it wouldn't do any good.

</p>
<tStamp t=00:06:31></tStamp>

<p>
My reps' assistants

are all on strike, too.

</p>
<tStamp t=00:06:33></tStamp>

<p>
Oh, bummer. Guess there's no way

to get in touch then.

</p>
<tStamp t=00:06:36></tStamp>

<p>
Too bad. I'd love to get together.

</p>
<tStamp t=00:06:42></tStamp>

<p>
Goodbye, fancy room.

</p>
<tStamp t=00:06:43></tStamp>

<p>
Goodbye, chair. Goodbye, Stinky Susan.

</p>
<tStamp t=00:06:46></tStamp>

<p>
Huh? [sniffs]

</p>
<tStamp t=00:06:49></tStamp>

<p>
-Where to?

-Um...

</p>
<tStamp t=00:06:51></tStamp>

<p>
Home, I-- I guess.

</p>
<tStamp t=00:06:59></tStamp>

<p>
Whoa, whoa, whoa.

Hey! Stop the car. Let me out here.

</p>
<tStamp t=00:07:02></tStamp>

<p>
Wow, already stopping for a drink?

</p>
<tStamp t=00:07:04></tStamp>

<p>
Thank you,

your commentary is very helpful.

</p>
<tStamp t=00:07:06></tStamp>

<p>
-Five stars, though, right?

-[groans]

</p>
<tStamp t=00:07:11></tStamp>

<p>
[slurps]

</p>
<tStamp t=00:07:12></tStamp>

<p>
[inhales, exhales]

</p>
<tStamp t=00:07:13></tStamp>

<p>
[sighs]

</p>
<tStamp t=00:07:15></tStamp>

<p>
-Doctor Champ, what are you doing?

-Okay.

</p>
<tStamp t=00:07:17></tStamp>

<p>
This mood about "never have another drop

of alcohol again?"

</p>
<tStamp t=00:07:21></tStamp>

<p>
-Are we sure about this?

-Okay, Doctor Champ, clearly, you--

</p>
<tStamp t=00:07:23></tStamp>

<p>
I'm sitting here, like,

whatever happened to moderation, buddy?

</p>
<tStamp t=00:07:26></tStamp>

<p>
So, you're telling me

the guiding philosophy

of the six months of rehab

I just paid for is complete bullshit?

</p>
<tStamp t=00:07:32></tStamp>

<p>
Hey, man, it works for you,

it works for you.

</p>
<tStamp t=00:07:34></tStamp>

<p>
As for me? Uh, check, please!

</p>
<tStamp t=00:07:38></tStamp>

<p>
No, that's a figure of speech.

I don't want the check.

</p>
<tStamp t=00:07:40></tStamp>

<p>
Please replenish me with another mar-gar.

</p>
<tStamp t=00:07:45></tStamp>

<p>
["Toccata and Fugue in D Minor" plays]

</p>
<tStamp t=00:07:49></tStamp>

<p>
-[bell ringing]

-Howdy, howdy!

</p>
<tStamp t=00:07:51></tStamp>

<p>
Welcome to Mike and Morgan's

House of Organs!

</p>
<tStamp t=00:07:54></tStamp>

<p>
We handle all your matters,

from keyboards to bladders.

</p>
<tStamp t=00:07:57></tStamp>

<p>
Mike, give it a rest.

</p>
<tStamp t=00:07:58></tStamp>

<p>
-What's with all the boxes?

-We're going out of business.

</p>
<tStamp t=00:08:03></tStamp>

<p>
Oh, no!

</p>
<tStamp t=00:08:04></tStamp>

<p>
I told you

we should just stick to the pianos.

</p>
<tStamp t=00:08:06></tStamp>

<p>
You wanted to expand into body parts.

</p>
<tStamp t=00:08:09></tStamp>

<p>
You printed the sign that said,

</p>
<tStamp t=00:08:11></tStamp>

<p>
"For all your organ needs."

I was just trying to keep us honest.

</p>
<tStamp t=00:08:14></tStamp>

<p>
Judging from the foolishness

of your business plan,

</p>
<tStamp t=00:08:16></tStamp>

<p>
I assume you don't keep records,

but we're trying to track down

my son's kidney.

</p>
<tStamp t=00:08:20></tStamp>

<p>
Oh...

</p>
<tStamp t=00:08:21></tStamp>

<p>
Sorry, all our kidneys went to Chicago.

Jeremiah Whitewhale bought us out.

</p>
<tStamp t=00:08:25></tStamp>

<p>
-[gasps]

-[organ plays]

</p>
<tStamp t=00:08:26></tStamp>

<p>
-Of Whitewhale Industries? Why?

-He's stockpiling organs

because he's a rich old guy

who wants to live forever.

</p>
<tStamp t=00:08:33></tStamp>

<p>
[organ plays]

</p>
<tStamp t=00:08:34></tStamp>

<p>
Oh, no!

</p>
<tStamp t=00:08:36></tStamp>

<p>
Well, this was a pointless excursion.

I'm heading back to the hospital.

</p>
<tStamp t=00:08:39></tStamp>

<p>
I'm sorry I couldn't be more helpful.

</p>
<tStamp t=00:08:41></tStamp>

<p>
No. It's my fault

for expecting anything different.

</p>
<tStamp t=00:08:45></tStamp>

<p>
-[door opens, closes]

-[groans]

</p>
<tStamp t=00:08:47></tStamp>

<p>
Can we offer you anything on your way out?

</p>
<tStamp t=00:08:48></tStamp>

<p>
You want a Wurlitzer or a spleen

or an industrial-sized tub

of general anesthesia?

</p>
<tStamp t=00:08:54></tStamp>

<p>
Yeah, give me the anesthesia.

</p>
<tStamp t=00:08:57></tStamp>

<p>
[Diane] You could sneak in

during the party

as long as nobody's estranged husband

who's a cop is visiting.

</p>
<tStamp t=00:09:02></tStamp>

<p>
Holiday party, huh?

</p>
<tStamp t=00:09:03></tStamp>

<p>
-What? Where am I?

-You're in Chicago!

</p>
<tStamp t=00:09:06></tStamp>

<p>
-Hi, I'm Diane. This is Guy.

-How you doin'?

</p>
<tStamp t=00:09:09></tStamp>

<p>
Oh! Are you ready for introductions

or are you still processing

the whole being kidnapped

across state lines?

</p>
<tStamp t=00:09:14></tStamp>

<p>
I'm sorry, what?

</p>
<tStamp t=00:09:15></tStamp>

<p>
We're breaking

into the Whitewhale building.

</p>
<tStamp t=00:09:17></tStamp>

<p>
-Why?

-To get back my kidney and save Mom

and prove to you

that I'm not just a wacky screw-up

who engages primarily

in goofy whimsical mess-arounds.

</p>
<tStamp t=00:09:26></tStamp>

<p>
-How did you get me on the plane?

-We did a <i>Weekend at Bernie's.</i>

</p>
<tStamp t=00:09:31></tStamp>

<p>
-[groans]

-As I was saying,

tonight's the Whitewhale

employee holiday party.

</p>
<tStamp t=00:09:35></tStamp>

<p>
Security will be tight, but you can use

my employee ID to get in,

because I'm technically

still on the payroll.

</p>
<tStamp t=00:09:39></tStamp>

<p>
Wait, you didn't quit?

We haven't worked there in months.

</p>
<tStamp t=00:09:42></tStamp>

<p>
Nobody's noticed!

They keep sending me checks.

</p>
<tStamp t=00:09:44></tStamp>

<p>
Cashing them is my way of very gradually

taking down the man from the inside.

</p>
<tStamp t=00:09:48></tStamp>

<p>
Hey. C-- can we sidebar for a minute?

Is this really the best use of your time?

</p>
<tStamp t=00:09:52></tStamp>

<p>
You've been beating yourself up

about how slowly the book's going. So...

</p>
<tStamp t=00:09:55></tStamp>

<p>
But the book is about me

and my life, so by living my life,

</p>
<tStamp t=00:09:58></tStamp>

<p>
I am in fact working on the book.

</p>
<tStamp t=00:10:00></tStamp>

<p>
You don't have to write this book

if you don't want to.

</p>
<tStamp t=00:10:02></tStamp>

<p>
Of course I want to.

</p>
<tStamp t=00:10:03></tStamp>

<p>
Okay. I'm just saying, since you started,

you've been pretty down.

</p>
<tStamp t=00:10:06></tStamp>

<p>
-Not yourself. Diane--

-Actually, pretty down is myself.

</p>
<tStamp t=00:10:09></tStamp>

<p>
Can we talk about this later?

We're being rude.

</p>
<tStamp t=00:10:11></tStamp>

<p>
Why don't you offer them

one of your fancy beers?

</p>
<tStamp t=00:10:14></tStamp>

<p>
So, all we need to do

is get into the party,

figure out where the kidneys are,

find my kidney, and sneak out,

all without drawing attention

to ourselves.

</p>
<tStamp t=00:10:24></tStamp>

<p>
And be careful, because

if Jeremiah Whitewhale catches you,

he can legally murder you.

</p>
<tStamp t=00:10:28></tStamp>

<p>
Now, can I get anyone an imperial stout?

</p>
<tStamp t=00:10:30></tStamp>

<p>
The barley was from Portland, Maine,

but the brewery is in Portland, Oregon!

</p>
<tStamp t=00:10:33></tStamp>

<p>
This plan is ludicrous.

</p>
<tStamp t=00:10:35></tStamp>

<p>
Hey, maybe instead

of criticizing everything

like you've done my entire life,

you can get on board?

</p>
<tStamp t=00:10:40></tStamp>

<p>
It's gonna work out.

</p>
<tStamp t=00:10:41></tStamp>

<p>
Things don't just work out, Todd!

</p>
<tStamp t=00:10:43></tStamp>

<p>
Of course they do!

I don't know why you're so negative!

</p>
<tStamp t=00:10:46></tStamp>

<p>
Do you want to help Mom,

or do you wanna just go back

to the hospital and wait?

</p>
<tStamp t=00:10:50></tStamp>

<p>
[sighs] Okay. I'm in.

</p>
<tStamp t=00:10:55></tStamp>

<p>
[thunder rumbling]

</p>
<tStamp t=00:10:57></tStamp>

<p>
I don't feel comfortable negotiating

without my fellow assistants present.

</p>
<tStamp t=00:11:00></tStamp>

<p>
Yeah. This is not about that.

</p>
<tStamp t=00:11:01></tStamp>

<p>
Good, because our demands haven't changed.

</p>
<tStamp t=00:11:03></tStamp>

<p>
Casey, it's been so thrilling to see you

grow into your role as strike captain.

</p>
<tStamp t=00:11:08></tStamp>

<p>
[gasps] You know, there's an opening

at my company for a development exec.

</p>
<tStamp t=00:11:12></tStamp>

<p>
I don't suppose you'd be interested?

</p>
<tStamp t=00:11:14></tStamp>

<p>
Oh! Uh...

</p>
<tStamp t=00:11:16></tStamp>

<p>
I'd have to think about it.

I've never rea--

</p>
<tStamp t=00:11:18></tStamp>

<p>
You'd get overpaid to read scripts,

company credit card,

and a parking spot in the good garage.

</p>
<tStamp t=00:11:23></tStamp>

<p>
-Um...

-Plus, your own assistant.

</p>
<tStamp t=00:11:26></tStamp>

<p>
-An... assistant?

-[thunder rumbling]

</p>
<tStamp t=00:11:29></tStamp>

<p>
-That is, of course, if the strike ends.

-[giggles]

</p>
<tStamp t=00:11:32></tStamp>

<p>
Well, that's a very generous offer,

but I'd have to talk it over

with my colleagues.

</p>
<tStamp t=00:11:38></tStamp>

<p>
Why? Those are assistants.

</p>
<tStamp t=00:11:40></tStamp>

<p>
You're not one of them anymore.

You're one of us.

</p>
<tStamp t=00:11:44></tStamp>

<p>
It's a two-year contract.

</p>
<tStamp t=00:11:45></tStamp>

<p>
Sign right there

and your troubles are over.

</p>
<tStamp t=00:11:48></tStamp>

<p>
[breathes heavily, exhales]

</p>
<tStamp t=00:11:51></tStamp>

<p>
[thunder strikes]

</p>
<tStamp t=00:11:52></tStamp>

<p>
[groans, shrieks]

</p>
<tStamp t=00:11:58></tStamp>

<p>
[both cackling]

</p>
<tStamp t=00:12:00></tStamp>

<p>
-[Ruthie giggles]

-What's so funny?

</p>
<tStamp t=00:12:02></tStamp>

<p>
I was just remembering a funny joke,

unrelated to this.

</p>
<tStamp t=00:12:05></tStamp>

<p>
Can you tell me what it is?

</p>
<tStamp t=00:12:06></tStamp>

<p>
You wouldn't get it.

It's about Zsa Zsa Gabor,

and it's no longer appropriate

in today's climate.

</p>
<tStamp t=00:12:11></tStamp>

<p>
You've made the right decision.

You're gonna love the new job.

</p>
<tStamp t=00:12:13></tStamp>

<p>
-Welcome to the team, Stacey.

-It's Case--

</p>
<tStamp t=00:12:18></tStamp>

<p>
[both] Hmm...

</p>
<tStamp t=00:12:22></tStamp>

<p>
Hey! [grunts]

</p>
<tStamp t=00:12:25></tStamp>

<p>
Sign here to run development

for Saoirse Ronan's production company,

Saoirse and Rescue.

</p>
<tStamp t=00:12:32></tStamp>

<p>
[Turteltaub] Mm-hmm.

</p>
<tStamp t=00:12:35></tStamp>

<p>
I can't be an assistant anymore!

</p>
<tStamp t=00:12:37></tStamp>

<p>
Shirley MacLaine threw a cactus at my head

because I set a meeting

with the wrong Steve McQueen!

</p>
<tStamp t=00:12:42></tStamp>

<p>
How was I supposed to know

she meant the dead one? [cries]

</p>
<tStamp t=00:12:46></tStamp>

<p>
Shh. It's okay. Just sign here

and orchestrate your own great escape.

</p>
<tStamp t=00:12:52></tStamp>

<p>
[Princess Carolyn chuckles]

</p>
<tStamp t=00:12:54></tStamp>

<p>
[Turteltaub] Ooh.

</p>
<tStamp t=00:12:59></tStamp>

<p>
[car horns honking]

</p>
<tStamp t=00:13:01></tStamp>

<p>
Okay, I'm going in.

</p>
<tStamp t=00:13:02></tStamp>

<p>
Todd, promise me

you'll be perspicacious in there.

</p>
<tStamp t=00:13:05></tStamp>

<p>
Perspicacious?

</p>
<tStamp t=00:13:06></tStamp>

<p>
-I don't know the meaning of the word.

-[sighs]

</p>
<tStamp t=00:13:12></tStamp>

<p>
-You're Diane?

-Yes!

</p>
<tStamp t=00:13:14></tStamp>

<p>
-Nguyen?

-That is correct!

</p>
<tStamp t=00:13:16></tStamp>

<p>
I find that hard to believe.

</p>
<tStamp t=00:13:17></tStamp>

<p>
Wow, that's racist.

</p>
<tStamp t=00:13:19></tStamp>

<p>
People don't always

look like their last names.

</p>
<tStamp t=00:13:22></tStamp>

<p>
For example, I'm white,

and my last name is Chavez.

</p>
<tStamp t=00:13:26></tStamp>

<p>
I thought your last name was Nguyen.

</p>
<tStamp t=00:13:28></tStamp>

<p>
-Oh! Uh, yeah, it is! Todd Nguyen.

-Not Diane Nguyen?

</p>
<tStamp t=00:13:33></tStamp>

<p>
Oh, yeah! Diane Nguyen.

</p>
<tStamp t=00:13:34></tStamp>

<p>
That's me, all right,

or my name isn't Todd Chavez.

</p>
<tStamp t=00:13:40></tStamp>

<p>
Well, that was a bust.

</p>
<tStamp t=00:13:41></tStamp>

<p>
Okay, this time,

you're Diane and I'll be Jorge.

</p>
<tStamp t=00:13:45></tStamp>

<p>
Todd, get in the trash can.

</p>
<tStamp t=00:13:46></tStamp>

<p>
I know I'm a disappointment to you,

but I do not live in a trash can, Jorge,

and I haven't for several years now! Hey!

</p>
<tStamp t=00:13:54></tStamp>

<p>
[both grunting]

</p>
<tStamp t=00:13:57></tStamp>

<p>
[speaking in Spanish]

</p>
<tStamp t=00:13:59></tStamp>

<p>
Uh... What? Sorry, I...

</p>
<tStamp t=00:14:01></tStamp>

<p>
Oh. No Español? [speaking in Spanish]

</p>
<tStamp t=00:14:06></tStamp>

<p>
Uh... go ahead.

</p>
<tStamp t=00:14:08></tStamp>

<p>
[indistinct chatter]

</p>
<tStamp t=00:14:13></tStamp>

<p>
-Wow, that was amazing!

-No. That was logical and straightforward.

</p>
<tStamp t=00:14:21></tStamp>

<p>
-Another club soda, please.

-[Doctor Champ] Nerd!

</p>
<tStamp t=00:14:24></tStamp>

<p>
Doctor Champ, what is your plan?

</p>
<tStamp t=00:14:26></tStamp>

<p>
Just gotta drink enough to be steady.

</p>
<tStamp t=00:14:28></tStamp>

<p>
Then, you take me back to Pastiches

and keep me out of trouble.

</p>
<tStamp t=00:14:31></tStamp>

<p>
That way, you don't have to go home

and I can be a good therapy horse.

</p>
<tStamp t=00:14:35></tStamp>

<p>
All my clients get sober, I am a winner,

put my picture on a magazine. [slurps]

</p>
<tStamp t=00:14:39></tStamp>

<p>
Look, I can't let you go back there drunk.

</p>
<tStamp t=00:14:41></tStamp>

<p>
You don't care about me!

You're scared of this guy.

</p>
<tStamp t=00:14:47></tStamp>

<p>
You can't help anybody else

unless you're honest with yourself.

</p>
<tStamp t=00:14:50></tStamp>

<p>
-Know what I mean?

-No. I never know what you mean.

</p>
<tStamp t=00:14:53></tStamp>

<p>
In fact, maybe I wouldn't be so scared

if you'd given me real therapy

over the last six months

instead of just plying me

with folksy aphorisms.

</p>
<tStamp t=00:14:59></tStamp>

<p>
I'm not a therapist! I'm a therapy horse,

a subtle but legally

important distinction.

</p>
<tStamp t=00:15:04></tStamp>

<p>
Besides, you wouldn't accept

real therapy from me.

</p>
<tStamp t=00:15:07></tStamp>

<p>
Oh, and why's that?

</p>
<tStamp t=00:15:08></tStamp>

<p>
Gee, I don't know,

maybe because I'm a horse,

so I remind you of your father,

so you simultaneously resent me

and crave my approval,

an approval which,

ironically, if granted--

</p>
<tStamp t=00:15:17></tStamp>

<p>
Yeah, I would dismiss immediately

and then use as an excuse to resent you

even more, what's your point?

</p>
<tStamp t=00:15:21></tStamp>

<p>
My point is, you're stunted from having

healthy relationships with horses, idiot!

</p>
<tStamp t=00:15:26></tStamp>

<p>
Oh, really? Well, if that were true,

</p>
<tStamp t=00:15:27></tStamp>

<p>
I would have almost

no other horses in my life.

</p>
<tStamp t=00:15:30></tStamp>

<p>
Right, it's almost as if all your friends

and loved ones

are humans or dogs or cats--

</p>
<tStamp t=00:15:35></tStamp>

<p>
But then how do you explain

the one horse I do care about,

my half-sister Hollyhock,

who is also a reminder of my father?

</p>
<tStamp t=00:15:40></tStamp>

<p>
If your theory were true,

wouldn't I keep her at arms' length,

desperate for her to love me

but unwilling to be vulnerable enough

to allow her to hurt me?

</p>
<tStamp t=00:15:46></tStamp>

<p>
You blockhead, she's not your father!

</p>
<tStamp t=00:15:49></tStamp>

<p>
Hollyhock reminds you

of the horse you hate the most. Yourself!

</p>
<tStamp t=00:15:53></tStamp>

<p>
Okay, you got me!

</p>
<tStamp t=00:15:54></tStamp>

<p>
My parents gave me an internalized

self-hatred of horses.

</p>
<tStamp t=00:15:57></tStamp>

<p>
So, my horse body is a prison

that I can never escape.

</p>
<tStamp t=00:16:00></tStamp>

<p>
This manifests in rotten behavior

because I subconsciously believe

I deserve to be punished,

but being famous, I'm never punished,

so I act out even more.

</p>
<tStamp t=00:16:07></tStamp>

<p>
And since this pattern

is so woven into my identity,

it is unfathomable to me that it can

ever be curbed, so instead, I drink!

</p>
<tStamp t=00:16:14></tStamp>

<p>
Uh... Check, please!

</p>
<tStamp t=00:16:16></tStamp>

<p>
So, the only way I can progress

is to return to my life as a sober man

and finally hold myself accountable

for my actions, past and future.

</p>
<tStamp t=00:16:22></tStamp>

<p>
Oh, my God, is this what therapy is?

</p>
<tStamp t=00:16:24></tStamp>

<p>
Why do you keep bringing me checks?

</p>
<tStamp t=00:16:26></tStamp>

<p>
[glasses clanking]

</p>
<tStamp t=00:16:27></tStamp>

<p>
Uh... Doctor Champ?

</p>
<tStamp t=00:16:31></tStamp>

<p>
[elevator dings]

</p>
<tStamp t=00:16:33></tStamp>

<p>
Wow.

</p>
<tStamp t=00:16:34></tStamp>

<p>
-Sorry, folks!

-[both gasp]

</p>
<tStamp t=00:16:35></tStamp>

<p>
This floor's off-limits.

</p>
<tStamp t=00:16:37></tStamp>

<p>
-Oh, but...

-Oh, thank God you're here!

</p>
<tStamp t=00:16:38></tStamp>

<p>
I saw someone at the buffet

putting ketchup on a hot dog.

</p>
<tStamp t=00:16:41></tStamp>

<p>
-What? Not in my town!

-[keys jangling]

</p>
<tStamp t=00:16:44></tStamp>

<p>
[elevator dings]

</p>
<tStamp t=00:16:45></tStamp>

<p>
-Wow, you are really good at this.

-Let's go.

</p>
<tStamp t=00:16:48></tStamp>

<p>
[gasps] Ooh, wow. Hmm.

</p>
<tStamp t=00:16:52></tStamp>

<p>
Oh, look. People who selected kidneys

might also enjoy small intestines.

</p>
<tStamp t=00:16:57></tStamp>

<p>
Just the kidney. We don't need

to be up-sold on other innards.

</p>
<tStamp t=00:17:00></tStamp>

<p>
Yes, sir.

</p>
<tStamp t=00:17:02></tStamp>

<p>
[beeps]

</p>
<tStamp t=00:17:04></tStamp>

<p>
Thank you for... [clears throat] this.

</p>
<tStamp t=00:17:07></tStamp>

<p>
Uh. Once your mother is okay,

we will never bother you again.

</p>
<tStamp t=00:17:10></tStamp>

<p>
-I know that's what you want.

-Why would I want that?

</p>
<tStamp t=00:17:15></tStamp>

<p>
-You never understood me.

-I raised you as my own flesh.

</p>
<tStamp t=00:17:18></tStamp>

<p>
I was tough on you

because I expected big things from you.

</p>
<tStamp t=00:17:21></tStamp>

<p>
You weren't tough. You were mean.

</p>
<tStamp t=00:17:23></tStamp>

<p>
-Because the world is mean!

-Not my world!

</p>
<tStamp t=00:17:25></tStamp>

<p>
I wanted so much for you, Todd.

</p>
<tStamp t=00:17:27></tStamp>

<p>
I wanted to push you to be your best self.

I see now that I failed you.

</p>
<tStamp t=00:17:31></tStamp>

<p>
But you didn't fail me

because I am not a failure.

</p>
<tStamp t=00:17:34></tStamp>

<p>
Look... [sighs] Okay, Todd.

</p>
<tStamp t=00:17:37></tStamp>

<p>
Why do you need to be proud of me

on your terms?

</p>
<tStamp t=00:17:40></tStamp>

<p>
Why can't you see I'm living a good life?

I have friends. I have a job--

</p>
<tStamp t=00:17:44></tStamp>

<p>
You sleep on the couch

and you play with puppets all day.

</p>
<tStamp t=00:17:47></tStamp>

<p>
I'm happy, Jorge.

What more do you want from me?

</p>
<tStamp t=00:17:50></tStamp>

<p>
I want to know that you're okay!

</p>
<tStamp t=00:17:51></tStamp>

<p>
Then why haven't you called in ten years?

</p>
<tStamp t=00:17:54></tStamp>

<p>
You don't think I wanted to?

I'm not the one who...

</p>
<tStamp t=00:17:57></tStamp>

<p>
-What?

-[Jorge exhales]

</p>
<tStamp t=00:17:59></tStamp>

<p>
She loves you, your mother.

</p>
<tStamp t=00:18:01></tStamp>

<p>
But she's very proud.

If you called her, she would talk to you.

</p>
<tStamp t=00:18:05></tStamp>

<p>
Well, she can't talk now

because she's in a coma, right?

</p>
<tStamp t=00:18:09></tStamp>

<p>
[sighs] Yeah.

</p>
<tStamp t=00:18:13></tStamp>

<p>
What are they talking about?

</p>
<tStamp t=00:18:17></tStamp>

<p>
-Oh, shit, oh, shit, oh, shit.

-[keys beeping]

</p>
<tStamp t=00:18:19></tStamp>

<p>
[groans] Chavezes! You got company!

</p>
<tStamp t=00:18:21></tStamp>

<p>
Get out of there now! Do you read me?

</p>
<tStamp t=00:18:23></tStamp>

<p>
[Diane on radio] <i>Hello? Hello?</i>

</p>
<tStamp t=00:18:25></tStamp>

<p>
Diane? Why is there a walkie-talkie

in our kitchen?

</p>
<tStamp t=00:18:28></tStamp>

<p>
-God damn it!

-[man] Uh...

</p>
<tStamp t=00:18:30></tStamp>

<p>
Excuse me? This garage

is for shopping center customers only.

</p>
<tStamp t=00:18:34></tStamp>

<p>
[groans] Okay, fine, I'll buy a pretzel.

</p>
<tStamp t=00:18:36></tStamp>

<p>
-Or you could just leave.

-No, now I want the pretzel.

</p>
<tStamp t=00:18:39></tStamp>

<p>
[Guy]<i> Hey, Diane, get me a pretzel,</i>

<i>too, please. Love you, okay?</i>

</p>
<tStamp t=00:18:43></tStamp>

<p>
[Jorge gasps] Someone's coming.

We have to go.

</p>
<tStamp t=00:18:46></tStamp>

<p>
I'm not going until I get my kidney.

</p>
<tStamp t=00:18:47></tStamp>

<p>
-Todd, this is serious.

-Yes, I understand.

</p>
<tStamp t=00:18:50></tStamp>

<p>
You are very serious.

</p>
<tStamp t=00:18:51></tStamp>

<p>
You read serious books

and listen to Sirius XM.

</p>
<tStamp t=00:18:54></tStamp>

<p>
We have to go right now.

</p>
<tStamp t=00:18:55></tStamp>

<p>
-Hey!

-Why do you always fight me?

</p>
<tStamp t=00:18:59></tStamp>

<p>
Why do you always try

to make me leave places?

</p>
<tStamp t=00:19:01></tStamp>

<p>
-[man] Hey!

-[both gasp]

</p>
<tStamp t=00:19:02></tStamp>

<p>
Stay right where you are!

</p>
<tStamp t=00:19:05></tStamp>

<p>
-Whoa! [exhales]

-[grumbles]

</p>
<tStamp t=00:19:08></tStamp>

<p>
Um...

</p>
<tStamp t=00:19:11></tStamp>

<p>
[sighs]

</p>
<tStamp t=00:19:13></tStamp>

<p>
[groans]

</p>
<tStamp t=00:19:17></tStamp>

<p>
Uh, I'm sure the other assistants

will be here any minute.

</p>
<tStamp t=00:19:21></tStamp>

<p>
Traffic's real bad because of the rain.

</p>
<tStamp t=00:19:23></tStamp>

<p>
No one else is coming, Stuart.

</p>
<tStamp t=00:19:25></tStamp>

<p>
-Uh... because of the rain?

-They got promoted.

</p>
<tStamp t=00:19:28></tStamp>

<p>
Your ranks are divided.

</p>
<tStamp t=00:19:29></tStamp>

<p>
Your leadership has abandoned you.

Face it, the strike is over.

</p>
<tStamp t=00:19:32></tStamp>

<p>
Whoa. Okay.

</p>
<tStamp t=00:19:35></tStamp>

<p>
We've drawn up a new collective agreement.

</p>
<tStamp t=00:19:36></tStamp>

<p>
You get none of the things you asked for

and you start work again Monday.

</p>
<tStamp t=00:19:39></tStamp>

<p>
Sounds fair.

</p>
<tStamp t=00:19:41></tStamp>

<p>
If I sign this, does that mean

I get a promotion, too?

</p>
