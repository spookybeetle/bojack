  Fish Out Of Water
<tStamp t=00:00:13></tStamp>

<p>
Why do I have to go to this thing?

</p>
<tStamp t=00:00:15></tStamp>

<p>
If we want to be

a legitimate awards contender,

</p>
<tStamp t=00:00:17></tStamp>

<p>
<i>Secretariat </i>needs to make an appearance

at a big festival.

</p>
<tStamp t=00:00:20></tStamp>

<p>
-I can't just go to Cannes?

-You Cannes not.

</p>
<tStamp t=00:00:23></tStamp>

<p>
Apparently, the French do not care for you

ever since you said that thing

in the press.

</p>
<tStamp t=00:00:27></tStamp>

<p>
Hey, I stand by my critique of Sartre.

</p>
<tStamp t=00:00:29></tStamp>

<p>
His philosophical arguments helped

tyrannical regimes justify overt cruelty.

</p>
<tStamp t=00:00:33></tStamp>

<p>
Also, the French smell and I hate them.

</p>
<tStamp t=00:00:35></tStamp>

<p>
And you can't go to Sundance

because Robert Redford hates you.

</p>
<tStamp t=00:00:38></tStamp>

<p>
Someone had to tell him

<i>The Horse Whisperer </i>was offensive.

</p>
<tStamp t=00:00:41></tStamp>

<p>
Sorry, but real horses don't just do

whatever someone says.

</p>
<tStamp t=00:00:44></tStamp>

<p>
And that's why you need to go

to this festival.

</p>
<tStamp t=00:00:47></tStamp>

<p>
[sighs] If you say so.

</p>
<tStamp t=00:00:48></tStamp>

<p>
The Pacific Ocean Film Fest, or POFF,

is the biggest underwater film festival

in the world.

</p>
<tStamp t=00:00:55></tStamp>

<p>
You make a splash there,

people are going to notice.

</p>
<tStamp t=00:00:58></tStamp>

<p>
Fine.

</p>
<tStamp t=00:00:59></tStamp>

<p>
All you need to do is get

to the premiere on time, 8:00.

</p>
<tStamp t=00:01:02></tStamp>

<p>
Walk the red carpet, wave at the crowd,

kiss some fish babies.

</p>
<tStamp t=00:01:06></tStamp>

<p>
[groans] Fish. They're so annoying.

</p>
<tStamp t=00:01:08></tStamp>

<p>
-[squeaking]

-Sorry, lady. No <i>habla </i>fish talk.

</p>
<tStamp t=00:01:11></tStamp>

<p>
You need to be sensitive to their culture.

Things are different down there.

</p>
<tStamp t=00:01:15></tStamp>

<p>
You know what a thumb's up means, right?

</p>
<tStamp t=00:01:17></tStamp>

<p>
Yes, I know what a thumb's up means.

I'll be fine.

</p>
<tStamp t=00:01:20></tStamp>

<p>
Oh, I wanted to warn you.

</p>
<tStamp t=00:01:21></tStamp>

<p>
Kelsey Jannings

is also going to be at the festival.

</p>
<tStamp t=00:01:25></tStamp>

<p>
-Kelsey? No.

-She has another film there.

</p>
<tStamp t=00:01:27></tStamp>

<p>
I haven't talked to her

since she got fired from <i>Secretariat.</i>

</p>
<tStamp t=00:01:30></tStamp>

<p>
Well, luckily you won't have to talk much

because you'll both be underwater.

</p>
<tStamp t=00:01:33></tStamp>

<p>
God, I haven't been underwater

since my mother tried to drown me

in the bathtub when I was 22.

</p>
<tStamp t=00:01:39></tStamp>

<p>
I can't do this, Ana. I'm sorry.

</p>
<tStamp t=00:01:41></tStamp>

<p>
-Sir.

-I'm getting off.

</p>
<tStamp t=00:01:42></tStamp>

<p>
You can't.

We've already pressurized the cabin.

</p>
<tStamp t=00:01:45></tStamp>

<p>
-Sir, please return to your seat.

-No. I don't want to do this.

</p>
<tStamp t=00:01:49></tStamp>

<p>
You can't make me.

</p>
<tStamp t=00:01:50></tStamp>

<p>
I'm a land creature.

I don't belong down there.

</p>
<tStamp t=00:01:52></tStamp>

<p>
You can lead me to water,

but you cannot make--

</p>
