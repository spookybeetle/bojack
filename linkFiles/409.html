</p>
<tStamp t=00:09:33></tStamp>

<p>
This is for a sexy catfish

I met on the Internet.

</p>
<tStamp t=00:09:36></tStamp>

<p>
-Charley?

-Princess Carolyn!

</p>
<tStamp t=00:09:39></tStamp>

<p>
-You work at a jewelry store now?

-No, I own my own management company.

</p>
<tStamp t=00:09:43></tStamp>

<p>
Oh, yeah. Good for you.

</p>
<tStamp t=00:09:44></tStamp>

<p>
I'm so proud of you.

</p>
<tStamp t=00:09:46></tStamp>

<p>
Your approval means nothing to me.

</p>
<tStamp t=00:09:48></tStamp>

<p>
So I guess it's good you said "no"

to my offer last year.

</p>
<tStamp t=00:09:51></tStamp>

<p>
What offer? I mean, exactly what offer

are you talking about?

</p>
<tStamp t=00:09:54></tStamp>

<p>
I get so many.

</p>
<tStamp t=00:09:56></tStamp>

<p>
Last year, I reached out to your guy...

I wanna say, "Ju-do"...

</p>
<tStamp t=00:10:01></tStamp>

<p>
-Judah.

-This guy's name was Judo.

</p>
<tStamp t=00:10:04></tStamp>

<p>
I offered to buy VIM

and merge it with Vigor.

</p>
<tStamp t=00:10:07></tStamp>

<p>
We would have called

the new company, VIMgor.

</p>
<tStamp t=00:10:10></tStamp>

<p>
Oh, right. That offer.

</p>
<tStamp t=00:10:13></tStamp>

<p>
I couldn't believe

when he said you weren't interested.

</p>
<tStamp t=00:10:15></tStamp>

<p>
Well, yeah. Because I wasn't,

and he does what I say.

</p>
<tStamp t=00:10:18></tStamp>

<p>
So I guess it all worked out for everyone.

</p>
<tStamp t=00:10:21></tStamp>

<p>
You got to start over as a manager,

and instead of buying VIM,

I bought the Utah Jazz.

</p>
<tStamp t=00:10:26></tStamp>

<p>
They're terrible agents,

but they're getting better.

</p>
<tStamp t=00:10:29></tStamp>

<p>
-Yeah.

-Anyway, nice bumping into--

</p>
<tStamp t=00:10:31></tStamp>

<p>
-Oh, sorry.

-Careful, please. Ooh.

</p>
<tStamp t=00:10:32></tStamp>

<p>
-[Charley] Oopsie. Oh, boy.

-No, no.

</p>
<tStamp t=00:10:34></tStamp>

<p>
-[crashes]

-Is that valuable? It is.

</p>
<tStamp t=00:10:36></tStamp>

<p>
My great, great, great grandmother

was dismayed that her trusted colleague

had kept this from her.

</p>
<tStamp t=00:10:40></tStamp>

<p>
<i>Her mind raced,</i>

<i>"Was Judah capable of deception?"</i>

</p>
<tStamp t=00:10:43></tStamp>

<p>
<i>She hoped what Charley told her</i>

<i>wasn't true,</i>

</p>
<tStamp t=00:10:46></tStamp>

<p>
<i>but her instincts told her</i>

<i>the frog wasn't smart enough to lie.</i>

</p>
<tStamp t=00:10:49></tStamp>

<p>
First quarter, second quarter.

Wow, that's a lot of quarters.

</p>
<tStamp t=00:10:52></tStamp>

<p>
Oh, excuse me. Hello.

</p>
<tStamp t=00:10:54></tStamp>

<p>
Judah, you'll never guess

who I just ran into.

</p>
<tStamp t=00:10:57></tStamp>

<p>
No, I won't. Very astute, ma'am.

</p>
<tStamp t=00:10:59></tStamp>

<p>
-It was Charley Witherspoon!

-Mm-hmm.

</p>
<tStamp t=00:11:02></tStamp>

<p>
-Char... ley...

-Hmm...? Hmm!

</p>
<tStamp t=00:11:05></tStamp>

<p>
-Wither... spoon!

-Hmm.

</p>
<tStamp t=00:11:07></tStamp>

<p>
-Okay.

-How does that make you feel?

</p>
<tStamp t=00:11:09></tStamp>

<p>
That very short story

makes me feel nothing.

</p>
<tStamp t=00:11:11></tStamp>

<p>
I don't think it's your fault

as a storyteller.

</p>
<tStamp t=00:11:13></tStamp>

<p>
I often have trouble engaging

with narratives.

</p>
<tStamp t=00:11:15></tStamp>

<p>
[Ruthie] <i>His lack of response</i>

<i>made her hope it wasn't true.</i>

</p>
<tStamp t=00:11:18></tStamp>

<p>
<i>Could it all have been a misunderstanding</i>

</p>
<tStamp t=00:11:20></tStamp>

<p>
<i>involving an enigmatic stranger</i>

<i>named "Judo"?</i>

</p>
<tStamp t=00:11:22></tStamp>

<p>
So, what's next, then?

</p>
<tStamp t=00:11:25></tStamp>

<p>
Ooh, I want to get the life rights

to that woman I saw on Instagram

who had a pretty coffee.

</p>
<tStamp t=00:11:29></tStamp>

<p>
I bet we could attach Jessica Alba

and Jonathan Taylor-Thomas by lunch.

</p>
<tStamp t=00:11:34></tStamp>

<p>
Okay, but I still don't understand

what a manager <i>is.</i>

</p>
<tStamp t=00:11:37></tStamp>

<p>
Do they just say the names

of movies and actors?

</p>
<tStamp t=00:11:39></tStamp>

<p>
How does that generate revenue?

</p>
<tStamp t=00:11:41></tStamp>

<p>
No one knows, Torf. It's not important!

</p>
<tStamp t=00:11:43></tStamp>

<p>
Be quiet, Torf. Take your Hush Pill.

</p>
<tStamp t=00:11:45></tStamp>

<p>
Yes, Miss Teach--

[gulps]

</p>
<tStamp t=00:11:47></tStamp>

<p>
Uh-hh...

</p>
<tStamp t=00:11:49></tStamp>

<p>
-Continue your presentation, Ruthie.

-Thank you.

</p>
<tStamp t=00:11:52></tStamp>

<p>
-And finally, Rob Lowe.

-Great idea, Princess Carolyn.

</p>
<tStamp t=00:11:55></tStamp>

<p>
But is it possible you've forgotten

your doctor's appointment?

</p>
<tStamp t=00:11:58></tStamp>

<p>
-Oh, fish!

-It's my fault.

</p>
<tStamp t=00:12:00></tStamp>

<p>
I rescheduled it in an attempt

to make your life easier.

</p>
<tStamp t=00:12:02></tStamp>

<p>
Thank you, Judah! I'll call you

if I think of any more actor names.

</p>
<tStamp t=00:12:10></tStamp>

<p>
[sighs]

Ba-ba-ba-ba-ba...

</p>
<tStamp t=00:12:12></tStamp>

<p>
-God, this is taking forever.

-We've been waiting for 15 minutes.

</p>
<tStamp t=00:12:15></tStamp>

<p>
I know. Let's just go home.

</p>
<tStamp t=00:12:16></tStamp>

<p>
No, Diane.

How could you even suggest that?

</p>
<tStamp t=00:12:18></tStamp>

<p>
This is not about us.

This is for my daughter.

</p>
<tStamp t=00:12:20></tStamp>

<p>
-Ugh.

-I know what I have to do.

</p>
<tStamp t=00:12:22></tStamp>

<p>
Excuse me, excuse me. Pardon me.

</p>
<tStamp t=00:12:23></tStamp>

<p>
Important celebrity doing the right thing.

</p>
<tStamp t=00:12:25></tStamp>

<p>
-Whoa, a famous guy!

-And he's doing the right thing?

</p>
<tStamp t=00:12:29></tStamp>

<p>
This is like when George Clooney

married that less famous lady!

</p>
<tStamp t=00:12:33></tStamp>

<p>
-Wait. Don't you mean Jurj Clooners?

-Who cares?

</p>
<tStamp t=00:12:36></tStamp>

<p>
Hello, friend.

</p>
<tStamp t=00:12:38></tStamp>

<p>
-Yes, it's me, BoJack Hor--

-Number?

</p>
<tStamp t=00:12:40></tStamp>

<p>
I'm sorry, I don't give out

my personal phone number.

</p>
<tStamp t=00:12:42></tStamp>

<p>
No, your number. You need a number

or I can't help you, BoJack Hor.

</p>
<tStamp t=00:12:46></tStamp>

<p>
Horseman. It's Horseman.

I don't look familiar to you at all?

</p>
<tStamp t=00:12:49></tStamp>

<p>
-Eh.

-Come on, BoJack. Let's get a number.

</p>
<tStamp t=00:12:52></tStamp>

<p>
Wait a minute. You're Diane Nguyen!

</p>
<tStamp t=00:12:55></tStamp>

<p>
I recognize you

from your <i>Girl Croosh </i>avatar.

</p>
<tStamp t=00:12:57></tStamp>

<p>
I loved "Twenty Reasons

to Try the Diva Cup."

</p>
<tStamp t=00:13:00></tStamp>

<p>
Oh, wow, thanks! You didn't think

20 was too many reasons?

</p>
<tStamp t=00:13:04></tStamp>

<p>
-No way. Number 14 blew my mind!

-Didn't I say it would?

</p>
<tStamp t=00:13:08></tStamp>

<p>
We don't have time.

Where do we get a number?

</p>
<tStamp t=00:13:10></tStamp>

<p>
-That line.

-What?

</p>
<tStamp t=00:13:11></tStamp>

<p>
And you'll need these-- [grunts]

forms.

</p>
<tStamp t=00:13:14></tStamp>

<p>
Ow, paper cut! Who still uses paper?

</p>
<tStamp t=00:13:16></tStamp>

<p>
Can't I just swipe an app or something?

</p>
<tStamp t=00:13:18></tStamp>

<p>
-Bye, Diane! Keep up the great work!

-[giggles]

</p>
<tStamp t=00:13:21></tStamp>

<p>
Oh, get over yourself.

</p>
<tStamp t=00:13:27></tStamp>

<p>
-[sighs]

-[door opens]

</p>
<tStamp t=00:13:28></tStamp>

<p>
-So? What's the prognosis?

-Hmm...

</p>
<tStamp t=00:13:31></tStamp>

<p>
I'm trying to think of the best way

to put this.

</p>
<tStamp t=00:13:34></tStamp>

<p>
As Charles Lindbergh would say,

</p>
<tStamp t=00:13:36></tStamp>

<p>
"Sometimes you fly an airplane,

and sometimes you lose a baby."

</p>
<tStamp t=00:13:39></tStamp>

<p>
In this case, you didn't fly the airplane.

</p>
<tStamp t=00:13:41></tStamp>

<p>
Wait, what?

</p>
<tStamp t=00:13:42></tStamp>

<p>
Your pregnancy is no longer viable.

</p>
<tStamp t=00:13:45></tStamp>

<p>
Well, how do we make it viable again?

</p>
<tStamp t=00:13:48></tStamp>

<p>
Mm-mm...

</p>
<tStamp t=00:13:49></tStamp>

<p>
How did this happen?

</p>
<tStamp t=00:13:50></tStamp>

<p>
Goodness, I don't know.

</p>
<tStamp t=00:13:51></tStamp>

<p>
I wouldn't beat yourself up.

Miscarriages happen for so many reasons.

</p>
<tStamp t=00:13:55></tStamp>

<p>
There's nothing medically wrong with you.

Maybe you just wanted the baby too much.

</p>
<tStamp t=00:13:59></tStamp>

<p>
Maybe you didn't deserve it

because you were unkind once.

</p>
<tStamp t=00:14:01></tStamp>

<p>
Maybe you ran afoul of a trickster god

or wood nymph who is now exacting revenge.

</p>
<tStamp t=00:14:05></tStamp>

<p>
Oof!

This is... a lot.

</p>
<tStamp t=00:14:08></tStamp>

<p>
Not for me. This is my job,

so... pretty regular day.

</p>
<tStamp t=00:14:11></tStamp>

<p>
What do I do next?

</p>
<tStamp t=00:14:13></tStamp>

<p>
Well, there's a procedure.

We can do it here later this week.

</p>
<tStamp t=00:14:15></tStamp>

<p>
You want Darlene to call someone

to drive you home?

</p>
<tStamp t=00:14:17></tStamp>

<p>
No, I'm okay. I don't need anyone.

</p>
<tStamp t=00:14:20></tStamp>

<p>
You're a real tough broad.

Except for, you know, the uterus area.

</p>
<tStamp t=00:14:24></tStamp>

<p>
Pretty weak.

</p>
<tStamp t=00:14:28></tStamp>

<p>
[gasps]

</p>
<tStamp t=00:14:30></tStamp>

<p>
-Hey, is my necklace ready?

-Oh, I was going to call you.

</p>
<tStamp t=00:14:33></tStamp>

<p>
When I was working on your necklace,

I realized something.

</p>
<tStamp t=00:14:36></tStamp>

<p>
-Oh?

-It's not actually gold,

it's just gold plated. See?

</p>
<tStamp t=00:14:40></tStamp>

<p>
No, it's very expensive.

</p>
<tStamp t=00:14:43></tStamp>

<p>
It's pretty, but basically worthless.

</p>
<tStamp t=00:14:45></tStamp>

<p>
And I'm only saying it's pretty

to make you feel better.

</p>
<tStamp t=00:14:47></tStamp>

<p>
But, it's from the old country.

It's been in my family for generations.

</p>
<tStamp t=00:14:52></tStamp>

<p>
No, this is costume jewelry

from J.C. Penney.

</p>
<tStamp t=00:14:55></tStamp>

<p>
Circa 1963.

Somebody just told you a story.

</p>
<tStamp t=00:14:59></tStamp>

<p>
-I'm sorry.

-Wha-- huh?

</p>
<tStamp t=00:15:01></tStamp>

<p>
So, do you still want a 24-karat gold

clasp on this garbage necklace, or...?

</p>
<tStamp t=00:15:08></tStamp>

<p>
[sniffles] Oh-hh!

</p>
<tStamp t=00:15:12></tStamp>

<p>
[gasps, sobs]

</p>
<tStamp t=00:15:22></tStamp>

<p>
-[ringtone plays]

-Oh!

</p>
<tStamp t=00:15:25></tStamp>

<p>
Ralph, hey!

</p>
<tStamp t=00:15:26></tStamp>

<p>
Hi, honey. Just checking

on how the doctor's appointment went

and also to wish you a happy

"Acknowledge Your Gardener Day."

</p>
<tStamp t=00:15:32></tStamp>

<p>
It's a work in progress. Don't judge.

</p>
<tStamp t=00:15:33></tStamp>

<p>
The doctor's appointment got pushed back.

</p>
<tStamp t=00:15:36></tStamp>

<p>
I'm actually just walking in now.

</p>
<tStamp t=00:15:37></tStamp>

<p>
Oh, hello. Yes, it's me, Princess Carolyn,

here for my appointment.

</p>
<tStamp t=00:15:41></tStamp>

<p>
I like your perfume.

</p>
<tStamp t=00:15:43></tStamp>

<p>
There is a painting of a lake on the wall.

</p>
<tStamp t=00:15:45></tStamp>

<p>
You sure it's okay I'm not there with you?

</p>
<tStamp t=00:15:47></tStamp>

<p>
Ralph, it's fine. I'm a big girl.

</p>
<tStamp t=00:15:49></tStamp>

<p>
Everything is so easy with you,

Princess Carolyn.

</p>
<tStamp t=00:15:51></tStamp>

<p>
I mean, that's why I love you.

</p>
<tStamp t=00:15:53></tStamp>

<p>
Yeah, easy. [chuckles]

</p>
<tStamp t=00:15:55></tStamp>

<p>
That's what the boys in high school

liked about me, too.

</p>
<tStamp t=00:15:57></tStamp>

<p>
[chuckles]

Okay, I'll see you tonight.

</p>
<tStamp t=00:15:59></tStamp>

<p>
-<i>I love you.</i>

-I love you, too.

</p>
<tStamp t=00:16:01></tStamp>

<p>
[beeps]

</p>
<tStamp t=00:16:02></tStamp>

<p>
[sighs]

</p>
<tStamp t=00:16:06></tStamp>

<p>
[slurps, moans]

</p>
<tStamp t=00:16:09></tStamp>

<p>
Oh, I didn't realize you were still here.

Do you need anything else before I go?

</p>
<tStamp t=00:16:12></tStamp>

<p>
No. Thank you.

</p>
<tStamp t=00:16:14></tStamp>

<p>
Should you be drinking that?

</p>
<tStamp t=00:16:16></tStamp>

<p>
You don't always know

what's best for me, Judah.

</p>
<tStamp t=00:16:18></tStamp>

<p>
Is everything okay, Princess Carolyn?

</p>
<tStamp t=00:16:19></tStamp>

<p>
Charley Witherspoon

made you an offer to buy Vim,

and you went over my head

and turned him down without telling me.

</p>
<tStamp t=00:16:26></tStamp>

<p>
Oh.

</p>
<tStamp t=00:16:27></tStamp>

<p>
-So it's true. You lied to me.

-Yes.

</p>
<tStamp t=00:16:30></tStamp>

<p>
Because you didn't want to work

at a big agency.

</p>
<tStamp t=00:16:32></tStamp>

<p>
-You don't fit in with other people.

-I--

</p>
<tStamp t=00:16:34></tStamp>

<p>
You're weird, so you'd rather stay here

where you have all the power.

</p>
<tStamp t=00:16:37></tStamp>

<p>
No, Princess Carolyn--

</p>
<tStamp t=00:16:39></tStamp>

<p>
So you lied to me,

and you made me look like an idiot!

</p>
<tStamp t=00:16:41></tStamp>

<p>
I was trying to protect you. If you heard,

you'd feel like you had to say yes.

</p>
<tStamp t=00:16:45></tStamp>

<p>
I don't need you to protect me.

</p>
<tStamp t=00:16:46></tStamp>

<p>
If you had time, you could decide

what to do next

on your own terms, which you did.

</p>
<tStamp t=00:16:50></tStamp>

<p>
Well, that's not your decision to make.

</p>
<tStamp t=00:16:51></tStamp>

<p>
Princess Carolyn,

I understand you're upset.

</p>
<tStamp t=00:16:53></tStamp>

<p>
-And perhaps your emotions--

-No.

</p>
<tStamp t=00:16:55></tStamp>

<p>
If I can't trust you,

then I can't work with you.

</p>
<tStamp t=00:16:57></tStamp>

<p>
You're fired.

</p>
<tStamp t=00:17:00></tStamp>

<p>
[sighs]

</p>
<tStamp t=00:17:03></tStamp>

<p>
Thank you for my time here,

Princess Carolyn.

</p>
<tStamp t=00:17:04></tStamp>

<p>
It's been very pleasurable. Until now.

</p>
<tStamp t=00:17:07></tStamp>

<p>
This part is... sad.

</p>
<tStamp t=00:17:11></tStamp>

<p>
Don't forget,

you have reservations at 8:00.

</p>
<tStamp t=00:17:13></tStamp>

<p>
-Thank you, Judah.

-Good night.

</p>
<tStamp t=00:17:18></tStamp>

<p>
Ruthie, this story has gotten really dark.

</p>
<tStamp t=00:17:21></tStamp>

<p>
It has a happy ending. I promise.

</p>
<tStamp t=00:17:23></tStamp>

<p>
Well, can we get there soon?

</p>
<tStamp t=00:17:24></tStamp>

<p>
This assignment

was supposed to be six beans long.

</p>
<tStamp t=00:17:28></tStamp>

<p>
You've already gone on for eight beans.

</p>
<tStamp t=00:17:30></tStamp>

<p>
Okay. I'm almost finished.

</p>
<tStamp t=00:17:31></tStamp>

<p>
But first, let's check in

with BoJack and Diane again.

</p>
<tStamp t=00:17:34></tStamp>

<p>
What have they been up to?

</p>
<tStamp t=00:17:35></tStamp>

<p>
[beeping]

Error. Error.

</p>
<tStamp t=00:17:38></tStamp>

<p>
I'm not leaving

without the certificate!

</p>
<tStamp t=00:17:40></tStamp>

<p>
I danced your dance, lady.

I filled out that form.

</p>
<tStamp t=00:17:42></tStamp>

<p>
But I will not wait in this line anymore.

</p>
<tStamp t=00:17:44></tStamp>

<p>
Not one person in here

offered me a Fiji water,

and I am parched

from all the yelling I've been doing!

</p>
<tStamp t=00:17:50></tStamp>

<p>
BoJack, let's go home.

</p>
<tStamp t=00:17:52></tStamp>

<p>
No, I would like to register

a formal complaint.

</p>
<tStamp t=00:17:55></tStamp>

<p>
-How do I do that?
