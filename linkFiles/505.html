<p>

</p>
<tStamp t=00:01:22></tStamp>

<p>

<tStamp t=00:01:25></tStamp>

<p>

<p>

<tStamp t=00:01:30></tStamp>

<p>

</p>
<tStamp t=00:01:32></tStamp>

<p>

<i>from </i>this conversation.

</p>
<tStamp t=00:01:35></tStamp>

<p>

Can we just talk about Mr. Peanutbutter?

</p>
<tStamp t=00:01:38></tStamp>

<p>

</p>
<tStamp t=00:01:40></tStamp>

<p>

</p>
<tStamp t=00:01:43></tStamp>

<p>
-Ugh!

-So then I got a food truck for the crew

"From your favorite star,"

it was from Mr. Peanutbutter.

</p>
<tStamp t=00:01:50></tStamp>

<p>

</p>
<tStamp t=00:01:51></tStamp>

<p>

</p>
<tStamp t=00:01:53></tStamp>

<p>
Do you think you can handle your shit

until then?

</p>
<tStamp t=00:01:55></tStamp>

<p>
Oh, yeah, that sounds like me.

What are you doing there anyway?

</p>
<tStamp t=00:01:58></tStamp>

<p>

</p>
<tStamp t=00:02:03></tStamp>

<p>
[series theme music playing]

</p>
<tStamp t=00:02:59></tStamp>

<p>

</p>
<tStamp t=00:03:01></tStamp>

<p>

<tStamp t=00:03:04></tStamp>

<p>

</p>
<tStamp t=00:03:06></tStamp>

<p>

</p>
<tStamp t=00:03:09></tStamp>

<p>

</p>
<tStamp t=00:03:12></tStamp>

<p>

another dumb teenager,

so liquored up, she forgot to make sure

</p>
<tStamp t=00:03:18></tStamp>

<p>

<tStamp t=00:03:20></tStamp>

<p>
{\an8}-Oh!

<tStamp t=00:03:23></tStamp>

<p>

me to marry him.

</p>
<tStamp t=00:03:25></tStamp>

<p>

</p>
<tStamp t=00:03:27></tStamp>

<p>
-His name's Strib, short for Dennis.

</p>
<tStamp t=00:03:30></tStamp>

<p>

but he's got those eyes

</p>
<tStamp t=00:03:35></tStamp>

<p>
{\an8}I hope you and Strib have

many happy child-free years, together.

</p>
<tStamp t=00:03:38></tStamp>

<p>
{\an8}I'm willing to do whatever I can

to help contribute to the child-free part.

</p>
<tStamp t=00:03:42></tStamp>

<p>
-Hmm.

-[phone buzzing, meowing]

</p>
<tStamp t=00:03:44></tStamp>

<p>

</p>
<tStamp t=00:03:45></tStamp>

<p>
{\an8}Everyone I work with is such a baby.

</p>
<tStamp t=00:03:47></tStamp>

<p>

[laughs]

</p>
<tStamp t=00:03:49></tStamp>

<p>
Hello, baby.

</p>
<tStamp t=00:03:50></tStamp>

<p>
{\an8}Hey, listen, I know Flip

just wants me to be "the woman",

<tStamp t=00:03:53></tStamp>

<p>

<p>

Fritz and Philbert keep saying,

<tStamp t=00:03:59></tStamp>

<p>
{\an8}<i>"This is so dangerous."</i>

<i>"Yeah, man. We're really dangerous."</i>

</p>

<p>

the motorcycles.

<p>

towards the side of the building,

<tStamp t=00:04:07></tStamp>

<p>

</p>
<tStamp t=00:04:10></tStamp>

<p>

<p>

<p>

he thought of it, himself.

<tStamp t=00:04:19></tStamp>

<tStamp t=00:04:24></tStamp>

<p>

<tStamp t=00:04:25></tStamp>

<p>
{\an8}-So sorry.

</p>
<tStamp t=00:04:28></tStamp>

<p>

some other candidates, mostly couples.

</p>
<tStamp t=00:04:32></tStamp>

<p>
{\an8}Oh.

<tStamp t=00:04:33></tStamp>

<p>

<tStamp t=00:04:36></tStamp>

<p>

</p>
<tStamp t=00:04:39></tStamp>

<p>

</p>
<tStamp t=00:04:41></tStamp>

<p>

</p>
<tStamp t=00:04:45></tStamp>

<p>
[sipping]

<p>

</p>
<tStamp t=00:04:50></tStamp>

<p>

</p>
<tStamp t=00:05:04></tStamp>

<p>

</p>
<tStamp t=00:05:07></tStamp>

<p>
Yeah, yeah, well, I'm not like that.

</p>
<tStamp t=00:05:09></tStamp>

<p>
I live in Los Angeles now,

<p>

<tStamp t=00:05:25></tStamp>

<p>

</p>
<tStamp t=00:05:26></tStamp>

<p>

<tStamp t=00:05:28></tStamp>

<p>
I'm gonna eat the shit

</p>
<tStamp t=00:05:37></tStamp>

<p>
[both laughing]

</p>
<tStamp t=00:05:38></tStamp>

<p>

I'll be right back.

<p>
-[grunts, sighs]

-[phone buzzing, meowing]

<p>
-Hello?

<tStamp t=00:05:49></tStamp>

<p>

<tStamp t=00:05:53></tStamp>

<tStamp t=00:05:54></tStamp>

<p>

[bell jingles]

<p>
-[water dripping]

<p>

</p>
<tStamp t=00:07:41></tStamp>

<p>
[chuckles] I do know it.

<tStamp t=00:07:43></tStamp>

<p>

</p>
<tStamp t=00:07:45></tStamp>

<p>
Not unless the first-string quarterback

gets hurt.

</p>
<tStamp t=00:07:48></tStamp>

<p>
Why aren't you

the first-string quarterback?

<tStamp t=00:07:50></tStamp>

<p>

<tStamp t=00:07:54></tStamp>

<p>

<tStamp t=00:07:56></tStamp>

<p>

</p>

<p>

I should be QB one, you know?

</p>
<tStamp t=00:08:02></tStamp>

<p>
That's a terrible approach.

</p>
<tStamp t=00:08:03></tStamp>

<p>
You need to go after what <i>you </i>want.

</p>
<tStamp t=00:08:05></tStamp>

<p>
You gotta fly into that sun,

like Amelia Earhart did.

</p>
<tStamp t=00:08:08></tStamp>

<p>
-What?

-You know, like in the movie.

</p>
<tStamp t=00:08:10></tStamp>

<p>

</p>
<tStamp t=00:08:13></tStamp>

</p>
<tStamp t=00:08:16></tStamp>

<p>

<tStamp t=00:08:31></tStamp>

<p>
-[bell jingling]

-Oh!

<tStamp t=00:08:34></tStamp>

<p>
[panting]

<tStamp t=00:08:35></tStamp>

<p>

<tStamp t=00:08:38></tStamp>

</p>
<tStamp t=00:08:44></tStamp>

<p>
I think the more time we spend together,

</p>
<tStamp t=00:08:46></tStamp>

<p>
-you'll realize I'm--

-[phone meowing]

<tStamp t=00:08:48></tStamp>

<p>

<tStamp t=00:08:51></tStamp>

<p>

<p>
Right. Hello?

<p>
-He wants to do it tomorrow, but--

<p>
Now, normally, I love questions
