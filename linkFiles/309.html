<tStamp t=00:19:49></tStamp>

<p>
- So standard rich people stuff?

- I guess.

</p>
<tStamp t=00:19:53></tStamp>

<p>
- How come you never told me that?

- I did.

</p>
<tStamp t=00:19:56></tStamp>

<p>
It's okay. I know

you never remember anything.

</p>
<tStamp t=00:19:58></tStamp>

<p>
That's not true.

I remember the first time we met.

</p>
<tStamp t=00:20:01></tStamp>

<p>
I went to see Marv. You were

at the desk in front of his office.

</p>
<tStamp t=00:20:05></tStamp>

<p>
I thought you were cute and you said,

"It's good to see you again."

</p>
<tStamp t=00:20:10></tStamp>

<p>
- So I guess we'd met before.

- That was the third time we met.

</p>
<tStamp t=00:20:13></tStamp>

<p>
The first time was when I was an intern.

I delivered a script to your house.

</p>
<tStamp t=00:20:18></tStamp>

<p>
You were passed out in the yard,

covered in tapioca pudding.

</p>
<tStamp t=00:20:21></tStamp>

<p>
I hosed you down, dragged you inside,

covered you with a blanket.

</p>
<tStamp t=00:20:24></tStamp>

<p>
- Really? I don't remember that.

- Shocker.

</p>
<tStamp t=00:20:26></tStamp>

<p>
So you've gone from daughter of a maid

to head of your own company.

</p>
<tStamp t=00:20:30></tStamp>

<p>
The company's not doing so hot.

</p>
<tStamp t=00:20:32></tStamp>

<p>
- Don't try to guilt me.

- It's not your fault.

</p>
<tStamp t=00:20:34></tStamp>

<p>
Turns out being an agent and running

an agency are two different skills.

</p>
<tStamp t=00:20:38></tStamp>

<p>
It's like asking a really delicious tomato

to make you a tomato sandwich.

</p>
<tStamp t=00:20:41></tStamp>

<p>
How's a tomato gonna make you

a sandwich? He's got no arms.

</p>
<tStamp t=00:20:44></tStamp>

<p>
You'll figure it out. Princess Carolyn

always lands on her feet.

</p>
<tStamp t=00:20:47></tStamp>

<p>
But I don't even know why I'm doing it.

Does any of it matter?

</p>
<tStamp t=00:20:50></tStamp>

<p>
Why are you an agent at all

if it makes you so miserable?

</p>
<tStamp t=00:20:54></tStamp>

<p>
Because I'm good at it.

</p>
<tStamp t=00:20:55></tStamp>

<p>
I mean, stuff hasn't been hitting lately.

But, usually, I'm really good at it.

</p>
<tStamp t=00:20:59></tStamp>

<p>
Just 'cause you're good at something

doesn't mean you have to do it.

</p>
<tStamp t=00:21:01></tStamp>

<p>
I'm good at driving sober,

but I don't relish the opportunity.

</p>
<tStamp t=00:21:04></tStamp>

<p>
But what else would I do?

Who else would I be?

</p>
<tStamp t=00:21:09></tStamp>

<p>
I do love you, by the way.

</p>
<tStamp t=00:21:11></tStamp>

<p>
I mean, as much

as I'm capable of loving anyone.

</p>
<tStamp t=00:21:15></tStamp>

<p>
Which is never enough. I'm sorry.

</p>
<tStamp t=00:21:23></tStamp>

<p>
Ta-da!

</p>
<tStamp t=00:21:27></tStamp>

<p>
Well, it is truly...

how should I put this? Wonderful.

</p>
<tStamp t=00:21:37></tStamp>

<p>
So you'll give Elefante a good review?

</p>
<tStamp t=00:21:39></tStamp>

<p>
No, I can't do that.

I waited over two hours to be served.

</p>
<tStamp t=00:21:44></tStamp>

<p>
The ambience was terrible.

You two were screaming all night.

</p>
<tStamp t=00:21:48></tStamp>

<p>
At one point, a waiter

ran through the restaurant on fire.

</p>
<tStamp t=00:21:51></tStamp>

<p>
Unfortunately,

you will be receiving my lowest rating:

four hundred and twelve stars,

out of a possible a billion.

</p>
<tStamp t=00:21:59></tStamp>

<p>
A billion stars?

</p>
<tStamp t=00:22:00></tStamp>

<p>
Yes, that's the rubric I use on

SamanthaGoesToRestaurants.tumblr.com.

</p>
<tStamp t=00:22:04></tStamp>

<p>
Oh, God, get out.

</p>
<tStamp t=00:22:06></tStamp>

<p>
I assure you the animated GIFs

with which I describe this encounter

shall be scathing.

</p>
<tStamp t=00:22:13></tStamp>

<p>
Mom! I just touched base

with Rooney, re: Winslow.

</p>
<tStamp t=00:22:16></tStamp>

<p>
He's out, we're in.

The conference room is ours.

</p>
<tStamp t=00:22:20></tStamp>

<p>
Perfect! This is the meeting

where we finally convince the big boys

to let us get babies addicted to vaping!

</p>
<tStamp t=00:22:25></tStamp>

<p>
Yes! Corporation!

</p>
<tStamp t=00:22:28></tStamp>

<p>
[all cheer]

</p>
<tStamp t=00:22:33></tStamp>

<p>
- How about a drink?

- I could drink.

</p>
<tStamp t=00:22:34></tStamp>

<p>
I don't think I can. I'm heading out.

</p>
<tStamp t=00:22:36></tStamp>

<p>
I got pretty badly burnt earlier

and in a lot of pain.

</p>
<tStamp t=00:22:39></tStamp>

<p>
I should probably go to the ER.

Have a great night.

</p>
<tStamp t=00:22:42></tStamp>

<p>
[groans]

</p>
<tStamp t=00:22:48></tStamp>

<p>
What's the second time we met?

</p>
<tStamp t=00:22:50></tStamp>

<p>
- A taping of <i>Horsin' Around.</i>

- Which episode?

</p>
<tStamp t=00:22:53></tStamp>

<p>
The one where Olivia put too much

detergent in the washing machine.

</p>
<tStamp t=00:22:57></tStamp>

<p>
Oh, yeah.

Nancy Reagan was the guest star.

</p>
<tStamp t=00:22:59></tStamp>

<p>
That woman

was the real actor in the family.

</p>
<tStamp t=00:23:01></tStamp>

<p>
I had just started working for Marv.

I went backstage to introduce myself.

</p>
<tStamp t=00:23:06></tStamp>

<p>
And then what happened?

</p>
<tStamp t=00:23:07></tStamp>

<p>
You told me you were too tired

pretending to be nice all night,

and to leave you alone.

</p>
<tStamp t=00:23:13></tStamp>

<p>
I'm a real jerk, huh?

</p>
<tStamp t=00:23:14></tStamp>

<p>
Yeah, but you're honest,

straightforward,

not fake nice

and don't beat around the bush.

</p>
<tStamp t=00:23:19></tStamp>

<p>
Your heart is tender,

so you protect it from people,

but sometimes you open up a wall

and it's incredible.

</p>
<tStamp t=00:23:26></tStamp>

<p>
You're doing the best you can,

considering your asshole parents.

</p>
<tStamp t=00:23:29></tStamp>

<p>
You have great taste in art,

and that pink spot

on your nose is just adorable.

</p>
<tStamp t=00:23:34></tStamp>

<p>
How many nice things was that,

about ten?

</p>
<tStamp t=00:23:36></tStamp>

<p>
- Just about.

- Okay, one more.

</p>
<tStamp t=00:23:38></tStamp>

<p>
You let me help you tonight

because you knew I needed it.

</p>
<tStamp t=00:23:41></tStamp>

<p>
You did it for me,

which was very sweet.

</p>
<tStamp t=00:23:44></tStamp>

<p>
Thanks. You're a good friend to me.

</p>
<tStamp t=00:23:48></tStamp>

<p>
- BoJack...

- Yeah?

</p>
<tStamp t=00:23:50></tStamp>

<p>
Are we friends?

</p>
<tStamp t=00:23:51></tStamp>

<p>
Yeah. I mean, I think we are.

</p>
<tStamp t=00:23:54></tStamp>

<p>
Or I think we can be.

</p>
<tStamp t=00:23:56></tStamp>

<p>
Okay, then as a friend, I'm asking you...

</p>
<tStamp t=00:24:00></tStamp>

<p>
Please don't leave me.

</p>
<tStamp t=00:24:01></tStamp>

<p>
- Princess Carolyn--

- Please.

</p>
<tStamp t=00:24:03></tStamp>

<p>
I can turn this around,

I just need more time.

</p>
<tStamp t=00:24:06></tStamp>

<p>
We're in a fragile period,

still finding our feet.

</p>
<tStamp t=00:24:08></tStamp>

<p>
Just give me six months

and then you can go.

</p>
<tStamp t=00:24:11></tStamp>

<p>
I promise,

I'll never ask anything from you again,

but please, give me six months.

</p>
<tStamp t=00:24:17></tStamp>

<p>
Sorry, I left my coat here.

</p>
<tStamp t=00:24:19></tStamp>

<p>
[whistles]

</p>
<tStamp t=00:24:25></tStamp>

<p>
[waiter] I got it.

</p>
<tStamp t=00:24:33></tStamp>

<p>
So? What do you think?

</p>
<tStamp t=00:24:37></tStamp>

<p>
No.

</script>
