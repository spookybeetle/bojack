<tStamp t=00:09:30></tStamp>

<tStamp t=00:09:32></tStamp>

<tStamp t=00:10:25></tStamp>

<p>
Whoa!

<tStamp t=00:10:28></tStamp>

<tStamp t=00:10:32></tStamp>

[yelps]

<p>
[ants gasp]

[chattering]

<tStamp t=00:10:41></tStamp>

<p>
Did you say you're a princess?

</p>
<tStamp t=00:10:44></tStamp>

<p>

</p>
<tStamp t=00:10:47></tStamp>

<tStamp t=00:10:49></tStamp>

</p>
<tStamp t=00:10:53></tStamp>

<p>

<tStamp t=00:11:15></tStamp>

<p>
[all gasp]

<tStamp t=00:11:16></tStamp>

</p>

<tStamp t=00:11:25></tStamp>

<p>
[groans]

<tStamp t=00:11:36></tStamp>

<p>
[groans]

<tStamp t=00:11:40></tStamp>

<p>
[guests chuckling]

</p>
<tStamp t=00:11:42></tStamp>

<p>
All right. Um...

</p>
<tStamp t=00:11:44></tStamp>

<p>
-God...!

<p>
-because you're so appealing.

</p>
<tStamp t=00:11:49></tStamp>

<p>
And for you, a radish. Enjoy.

</p>
<tStamp t=00:11:51></tStamp>

<p>

</p>
<tStamp t=00:11:52></tStamp>

<p>

<tStamp t=00:11:58></tStamp>

<p>

<tStamp t=00:12:00></tStamp>

<p>

</p>
<tStamp t=00:12:18></tStamp>

</p>
<tStamp t=00:12:22></tStamp>

<p>
Who said we have to go by your rules?

</p>
<tStamp t=00:12:23></tStamp>

<p>
Yeah, who made you leader

</p>
<tStamp t=00:12:26></tStamp>

<p>
I'm just gonna take all this and...

</p>
<tStamp t=00:12:28></tStamp>

<p>
You've appointed me.

Yes, I under-- citizens, look...

</p>
<tStamp t=00:12:30></tStamp>

<p>
Keep it together.

[grunts]

</p>
<tStamp t=00:12:33></tStamp>

<p>
-Weird stuff going on downstairs.

-[clicking]

</p>
<tStamp t=00:12:36></tStamp>

<p>
Humph.

</p>
<tStamp t=00:12:37></tStamp>

<p>

-Uh-oh.

</p>
<tStamp t=00:12:40></tStamp>

<p>

</p>
<tStamp t=00:12:43></tStamp>

<p>
I'm trapped underground

and it's all my husband's fault

and I'm gonna die in this mansion

</p>
<tStamp t=00:12:51></tStamp>

<p>
Okay. But on the bright side--

</p>
<tStamp t=00:12:53></tStamp>

<p>

you got a cool job, you got friends.

</p>
<tStamp t=00:12:58></tStamp>

<p>
Jesus, you're right.

</p>
<tStamp t=00:12:59></tStamp>

<p>
Even when I was above ground,

I wasn't satisfied.

</p>
<tStamp t=00:13:03></tStamp>

<p>
Oh, my God. I'm the problem!

</p>
<tStamp t=00:13:07></tStamp>

<p>
[sobbing]

</p>
<tStamp t=00:13:09></tStamp>

<p>
Whoa!

</p>
<tStamp t=00:13:11></tStamp>

<p>
What the...?

</p>
<tStamp t=00:13:12></tStamp>

<p>

</p>
<tStamp t=00:13:16></tStamp>

<p>
No. It...

</p>
<tStamp t=00:13:18></tStamp>

<p>
I am! I'm a pit.

</p>
<tStamp t=00:13:20></tStamp>

<p>
I'm a pit that good things fall into!

</p>
<tStamp t=00:13:24></tStamp>

<p>
Diane, you're not a pit.

</p>
<tStamp t=00:13:26></tStamp>

<p>
I'm a pit!

[sobbing]

</p>
<tStamp t=00:13:30></tStamp>

<p>
[sighs]

</p>
<tStamp t=00:13:33></tStamp>

<p>
I can't believe I'm crying.

This is so dumb.

</p>
<tStamp t=00:13:37></tStamp>

<p>

Don't feel bad about feeling bad.

</p>
<tStamp t=00:13:39></tStamp>

<p>

</p>
<tStamp t=00:13:42></tStamp>

</p>
<tStamp t=00:13:45></tStamp>

<p>

why didn't you call me?

</p>

</p>
<tStamp t=00:13:52></tStamp>

<p>
I wanted to be better

</p>
<tStamp t=00:13:55></tStamp>

</p>
<tStamp t=00:13:58></tStamp>

<p>

the best I could ever be

</p>
<tStamp t=00:14:04></tStamp>

<p>

</p>
<tStamp t=00:14:08></tStamp>

<p>
I need you in my life.

</p>
<tStamp t=00:14:10></tStamp>

<p>

-You're the biggest asshole I know,

and you're the only thing

that makes sense to me.

</p>
<tStamp t=00:14:16></tStamp>

<p>
[Diane sighs, moans]

</p>
<tStamp t=00:14:20></tStamp>

<p>
People should be able to have

some control over their lives down here.

</p>
<tStamp t=00:14:24></tStamp>

<p>
-Yeah!

-People need boundaries.

</p>
<tStamp t=00:14:25></tStamp>

<p>
Leadership means

sometimes being the bad guy.

</p>
<tStamp t=00:14:28></tStamp>

<p>
You hear that? Woodchuck's a bad guy!

</p>
<tStamp t=00:14:31></tStamp>

<p>

</p>
<tStamp t=00:14:32></tStamp>

<p>
-That's not...

-That's a point for Mr. Peanutbutter.

</p>
<tStamp t=00:14:34></tStamp>

<p>
And I'm the good guy,

so that's two points for me.

</p>
<tStamp t=00:14:37></tStamp>

</p>
<tStamp t=00:14:42></tStamp>

<p>
-Yeah!

-Points!

</p>
<tStamp t=00:14:43></tStamp>

<p>

That's another point for me.

</p>
<tStamp t=00:14:46></tStamp>

<p>

to save you in the first place.

</p>
<tStamp t=00:14:49></tStamp>

<p>

</p>
<tStamp t=00:14:51></tStamp>

<p>

That's more points for me.

</p>
<tStamp t=00:14:54></tStamp>

<p>
-He's right!

-What?!

</p>
<tStamp t=00:14:55></tStamp>

<tStamp t=00:14:57></tStamp>

<p>
[all] Yeah!

<tStamp t=00:14:58></tStamp>

<p>

</p>
<tStamp t=00:15:00></tStamp>

<p>
-Yeah!

-That's right.

</p>
<tStamp t=00:15:01></tStamp>

<p>

<tStamp t=00:15:02></tStamp>

</p>
<tStamp t=00:15:06></tStamp>

<p>

-Yeah!

</p>
<tStamp t=00:15:08></tStamp>

<p>

</p>
<tStamp t=00:15:12></tStamp>

<p>

</p>
<tStamp t=00:15:15></tStamp>

<p>

</p>
<tStamp t=00:15:18></tStamp>

<p>

the guy whose house this is.

</p>
<tStamp t=00:15:22></tStamp>

<p>
[chanting]

</p>
<tStamp t=00:15:25></tStamp>

<p>
Peanutbutter-- everybody.

</p>
<tStamp t=00:15:26></tStamp>

<p>
[chanting]

Peanutbutter! Peanutbutter!

</p>
<tStamp t=00:15:29></tStamp>

<p>
Peanutbutter!

</p>
<tStamp t=00:15:30></tStamp>

<p>
-Me!

-Peanutbutter!

</p>
<tStamp t=00:15:31></tStamp>

<p>
-Me!

-Peanutbutter!

</p>
<tStamp t=00:15:32></tStamp>

<p>
[faint chanting]

</p>
<tStamp t=00:15:34></tStamp>

-[snoring]

</p>
<tStamp t=00:15:37></tStamp>

<p>
-BoJack.

-What?

</p>
<tStamp t=00:15:38></tStamp>

<p>

-Cool.

</p>
<tStamp t=00:15:40></tStamp>

<p>

except for cooking sherry and Midori?

<tStamp t=00:15:48></tStamp>

</p>
<tStamp t=00:15:53></tStamp>

<p>

</p>
<tStamp t=00:15:58></tStamp>

<p>

girl in my house, this... daughter-type.

<tStamp t=00:16:05></tStamp>

<p>

</p>
<tStamp t=00:16:07></tStamp>

<p>
-[clatters]

</p>
<tStamp t=00:16:09></tStamp>

<p>

who her mother is.

</p>
<tStamp t=00:16:11></tStamp>

<p>

</p>
<tStamp t=00:16:13></tStamp>

<p>

<tStamp t=00:16:16></tStamp>

<p>

</p>
<tStamp t=00:16:17></tStamp>

<p>

</p>
<tStamp t=00:16:21></tStamp>

<p>

</p>
<tStamp t=00:16:23></tStamp>

<p>

boom-bah-boo! Smo-pen Sesame!

</p>
<tStamp t=00:16:28></tStamp>

<p>
-How do you know about that?

-I had an adopted brother.

</p>
<tStamp t=00:16:31></tStamp>

</p>
<tStamp t=00:16:33></tStamp>

<p>
-Ugh!

-Huh.

</p>
<tStamp t=00:16:36></tStamp>

<p>
-Whoa!

-Ooh!

</p>
<tStamp t=00:16:39></tStamp>

<p>

</p>
<tStamp t=00:16:43></tStamp>

<p>

</p>
<tStamp t=00:16:44></tStamp>

<p>

<p>

</p>
<tStamp t=00:16:54></tStamp>

</p>
<tStamp t=00:16:57></tStamp>

<p>

</p>
<tStamp t=00:16:59></tStamp>

<p>

</p>

<p>
[whispers]

</p>
<tStamp t=00:17:02></tStamp>

</p>
<tStamp t=00:17:05></tStamp>

<p>
<i>My </i>drones?

</p>
<tStamp t=00:17:07></tStamp>

<p>
[dance music plays]

</p>
<tStamp t=00:17:09></tStamp>

<p>

</p>
<tStamp t=00:17:10></tStamp>

<p>
Oliver, assemble the small council.

</p>
<tStamp t=00:17:12></tStamp>

<p>

</p>

<p>
[guests chanting]

<tStamp t=00:17:19></tStamp>

</p>
<tStamp t=00:17:24></tStamp>

</p>
<tStamp t=00:17:27></tStamp>

<p>

</p>
<tStamp t=00:17:29></tStamp>

</p>

</p>
<tStamp t=00:17:44></tStamp>

<p>

-Yeah!

</p>
<tStamp t=00:17:45></tStamp>

<p>

</p>
<tStamp t=00:17:47></tStamp>

<p>

</p>
<tStamp t=00:17:53></tStamp>

<p>

</p>
<tStamp t=00:17:57></tStamp>

<p>
-[chanting] Peanutbutter!

-No!

</p>
<tStamp t=00:17:58></tStamp>

<p>

-Thank you, thank you all.

<p>

</p>
