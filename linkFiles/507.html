<p>

<p>

<p>

</p>
<tStamp t=00:02:02></tStamp>

</p>

</p>
<tStamp t=00:02:06></tStamp>

<p>

</p>

<p>

</p>

<p>

<p>

</p>

<p>

<p>

BoBo, the Angsty Zebra.

</p>
<tStamp t=00:02:20></tStamp>

<p>

<i>In New Mexico.</i>

</p>
<tStamp t=00:02:25></tStamp>

<p>
{\an8}<i>And she trusted me. Also, I'm a zebra.</i>

</p>
<tStamp t=00:02:28></tStamp>

<p>

</p>
<tStamp t=00:02:31></tStamp>

<p>

<tStamp t=00:02:35></tStamp>

<p>

</p>

<tStamp t=00:02:41></tStamp>

<p>

<tStamp t=00:02:50></tStamp>

<p>

<tStamp t=00:02:54></tStamp>

<p>

<p>

</p>
<tStamp t=00:03:08></tStamp>

<p>
{\an8}[all murmuring]

<p>

<p>

<tStamp t=00:03:23></tStamp>

<tStamp t=00:03:35></tStamp>

</p>
<tStamp t=00:04:22></tStamp>

<p>
Okay.

</p>
<tStamp t=00:04:25></tStamp>

<p>
-Ah!

<p>

<p>
[grunting]

<p>

</p>
<tStamp t=00:04:57></tStamp>

<p>

</p>

</p>

<p>

<p>

with Emperor Finger-Face.

</p>

<p>

</p>
<tStamp t=00:05:24></tStamp>

<p>

<tStamp t=00:05:31></tStamp>

</p>
<tStamp t=00:05:34></tStamp>

<tStamp t=00:05:37></tStamp>

</p>
<tStamp t=00:05:40></tStamp>

<p>

</p>
<tStamp t=00:05:43></tStamp>

<p>

<p>

</p>
<tStamp t=00:05:50></tStamp>

<p>

<p>

because of how weird

<tStamp t=00:06:14></tStamp>

<tStamp t=00:06:22></tStamp>

<p>
-Okay.

<tStamp t=00:06:24></tStamp>

<p>

<p>

<p>

<tStamp t=00:07:59></tStamp>

<p>
-Yes.

<p>
[BoBo sighs]

<p>
-[sympathetic voice] Hey, buddy.

</p>
<tStamp t=00:08:05></tStamp>

<p>

</p>
<tStamp t=00:08:07></tStamp>

<p>

<p>

<tStamp t=00:08:13></tStamp>

</p>

<p>

</p>
<tStamp t=00:08:17></tStamp>

<p>

<p>

<tStamp t=00:08:32></tStamp>

<tStamp t=00:08:37></tStamp>

<tStamp t=00:08:39></tStamp>

<p>
-[sobbing]

<p>
[BoBo groans]

<tStamp t=00:08:58></tStamp>

<p>

frustration de-escalation,
