<p>

<p>

</p>

</p>

<p>

</p>
<tStamp t=00:04:08></tStamp>

</p>

<tStamp t=00:04:18></tStamp>

<p>

<tStamp t=00:04:21></tStamp>

<p>

<p>

</p>
<tStamp t=00:04:26></tStamp>

<p>

<tStamp t=00:06:54></tStamp>

<p>

<tStamp t=00:06:57></tStamp>

<p>

<p>

<tStamp t=00:07:27></tStamp>

<tStamp t=00:07:36></tStamp>

<tStamp t=00:07:38></tStamp>

<tStamp t=00:07:45></tStamp>

<p>

</p>
<tStamp t=00:07:47></tStamp>

<p>

</p>
<tStamp t=00:07:50></tStamp>

<p>

</p>
<tStamp t=00:07:54></tStamp>

<p>

</p>
<tStamp t=00:07:56></tStamp>

<p>

</p>
<tStamp t=00:07:57></tStamp>

<p>

</p>
<tStamp t=00:07:59></tStamp>

<p>

</p>
<tStamp t=00:08:02></tStamp>

<p>

</p>
<tStamp t=00:08:04></tStamp>

<p>

</p>
<tStamp t=00:08:06></tStamp>

<p>

</p>
<tStamp t=00:08:09></tStamp>

<p>

</p>
<tStamp t=00:08:11></tStamp>

<p>

<tStamp t=00:08:13></tStamp>

<tStamp t=00:08:25></tStamp>

<p>

<tStamp t=00:08:28></tStamp>

<tStamp t=00:08:31></tStamp>

<p>

</p>
<tStamp t=00:08:32></tStamp>

<p>

</p>
<tStamp t=00:08:36></tStamp>

<tStamp t=00:08:39></tStamp>

<p>

<tStamp t=00:08:45></tStamp>

<p>

All my kills were friendly fire.

</p>
<tStamp t=00:08:48></tStamp>

<p>
I also never liberated any camps.

I'm honestly not sure what I did.

</p>
<tStamp t=00:08:52></tStamp>

<p>
Here you go.

Your husband just pulled up, ma'am.

</p>
<tStamp t=00:08:54></tStamp>

<p>

</p>
<tStamp t=00:08:57></tStamp>

<p>

</p>
<tStamp t=00:09:01></tStamp>

<p>

</p>
<tStamp t=00:09:05></tStamp>

<p>
Anyone? No. Just me? Oh.

</p>
<tStamp t=00:09:07></tStamp>

<p>
That's what I thought.

</p>
<tStamp t=00:09:08></tStamp>

<p>

</p>
<tStamp t=00:09:13></tStamp>

<p>
That means something.

I will be remembered.

</p>
<tStamp t=00:09:15></tStamp>

<p>
-That has to mean something. I will be--

-[door opens]

</p>

<p>
